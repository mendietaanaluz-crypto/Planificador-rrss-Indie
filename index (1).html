<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planificador RRSS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f7f6f2; color: #1a1a1a; }
    button, input, textarea { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const PLATFORMS = {
      instagram: { label:"Instagram", color:"#E1306C", bg:"#fce4ec", icon:"📸", gradientBg:"linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)" },
      linkedin:  { label:"LinkedIn",  color:"#0A66C2", bg:"#e3f2fd", icon:"💼", gradientBg:"linear-gradient(135deg,#0077b5,#0A66C2,#004182)" },
    };
    const STATUS_OPTIONS = ["Idea","En redacción","Listo","Publicado"];
    const STATUS_COLORS  = { "Idea":"#f0f0f0","En redacción":"#fff9c4","Listo":"#c8e6c9","Publicado":"#bbdefb" };
    const STATUS_TEXT    = { "Idea":"#666","En redacción":"#795548","Listo":"#2e7d32","Publicado":"#1565c0" };
    const CONTENT_TYPES  = [
      { value:"image",    label:"Imagen",     icon:"🖼️" },
      { value:"video",    label:"Video",      icon:"🎬" },
      { value:"carousel", label:"Carrusel",   icon:"🎠" },
      { value:"text",     label:"Solo texto", icon:"✍️" },
    ];
    const DAYS   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
    const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

    const STORAGE_KEY = "planificador_rrss_v3";
    const loadPosts = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); } catch { return []; }};
    const savePosts = p  => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {} };

    const getDaysInMonth = (y,m) => new Date(y,m+1,0).getDate();
    const getFirstDay    = (y,m) => new Date(y,m,1).getDay();
    const isVideo = url => /\.(mp4|webm|ogg|mov)(\?|$)/i.test(url)||url.includes("youtube")||url.includes("youtu.be")||url.includes("vimeo");
    const getYTThumb = url => { const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/); return m?`https://img.youtube.com/vi/${m[1]}/mqdefault.jpg`:null; };

    // ── Google Drive URL converter ──────────────────────────────────────────
    // Acepta cualquier formato de link de Drive y devuelve URL directa para <img>
    function convertDriveUrl(url) {
      if (!url) return url;
      // Ya es una URL directa de Drive (uc?export=view)
      if (url.includes("drive.google.com/uc")) return url;
      // Formato: /file/d/ID/view  o  /file/d/ID/preview
      const fileMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (fileMatch) return `https://drive.google.com/uc?export=view&id=${fileMatch[1]}`;
      // Formato: ?id=ID
      const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (idMatch) return `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
      // Formato: /open?id=ID
      const openMatch = url.match(/\/open\?id=([a-zA-Z0-9_-]+)/);
      if (openMatch) return `https://drive.google.com/uc?export=view&id=${openMatch[1]}`;
      return url; // no es Drive, devolver tal cual
    }
    function isDriveUrl(url) { return url && url.includes("drive.google.com"); }

    const EMPTY_FORM = { platform:"instagram", title:"", caption:"", status:"Idea", hashtags:"", contentType:"image", mediaUrl:"", coverUrl:"" };

    function MediaPreview({ url, compact=false, cover=false }){
      const [err,setErr] = useState(false);
      useEffect(()=>setErr(false),[url]);
      if(!url) return null;
      const resolved = convertDriveUrl(url);
      const h = cover ? (compact?60:140) : (compact?80:220);
      const ytThumb = getYTThumb(resolved);
      const sty = { width:"100%", height:h, objectFit:"cover", borderRadius:compact?6:10, display:"block" };
      if(ytThumb) return (
        <div style={{position:"relative",borderRadius:compact?6:10,overflow:"hidden",height:h}}>
          <img src={ytThumb} alt="" style={sty} onError={()=>setErr(true)}/>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.35)"}}>
            <span style={{fontSize:compact?18:36}}>▶️</span>
          </div>
        </div>
      );
      if(!err && (isDriveUrl(url) || /\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i.test(resolved)))
        return <img src={resolved} alt="" style={sty} onError={()=>setErr(true)}/>;
      if(!err && isVideo(resolved)) return <video src={resolved} controls={!compact} muted style={sty} onError={()=>setErr(true)}/>;
      return (
        <div style={{background:"#f0f0f0",borderRadius:compact?6:10,height:h,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
          <span style={{fontSize:compact?16:26}}>🔗</span>
          {!compact&&<div style={{fontSize:11,color:"#888",padding:"0 8px",wordBreak:"break-all"}}>{url.slice(0,60)}{url.length>60?"…":""}</div>}
        </div>
      );
    }

    function DriveInput({ value, onChange, placeholder, label }){
      const [converted, setConverted] = useState(false);
      function handleChange(e){ setConverted(false); onChange(e.target.value); }
      function handleConvert(){ const n=convertDriveUrl(value); if(n!==value){onChange(n);setConverted(true);} }
      const isDrive = isDriveUrl(value);
      const alreadyOk = value && value.includes("uc?export=view");
      return (
        <div style={{marginBottom:8}}>
          {label && <label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>{label}</label>}
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <input placeholder={placeholder} value={value} onChange={handleChange}
              style={{flex:1,padding:"9px 12px",borderRadius:8,border:`1.5px solid ${isDrive&&!alreadyOk?"#ff9800":"#e0e0e0"}`,fontSize:12,outline:"none",background:"#fff"}}/>
            {isDrive && !alreadyOk && (
              <button onClick={handleConvert}
                style={{padding:"8px 12px",borderRadius:8,border:"none",background:"#ff9800",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                🔄 Convertir
              </button>
            )}
            {(converted||alreadyOk) && isDrive && (
              <div style={{padding:"8px 10px",borderRadius:8,background:"#e8f5e9",fontSize:11,color:"#2e7d32",fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}>✓ Drive OK</div>
            )}
          </div>
          {isDrive && !alreadyOk && <div style={{fontSize:10,color:"#ff9800",marginTop:3}}>⚠️ Link de Drive — tocá "Convertir" para que la imagen se vea</div>}
        </div>
      );
    }


    function PostCard({ post }){
      const pl=PLATFORMS[post.platform], img=post.coverUrl||post.mediaUrl;
      return (
        <div style={{border:"1px solid #e8e8e8",borderRadius:14,overflow:"hidden",background:"#fff",maxWidth:300}}>
          <div style={{padding:"10px 12px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid #f5f5f5"}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:pl.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,border:`2px solid ${pl.color}`}}>{pl.icon}</div>
            <div><div style={{fontSize:12,fontWeight:700}}>tu_cuenta</div><div style={{fontSize:10,color:"#aaa"}}>{pl.label}</div></div>
          </div>
          {img&&<div style={{background:"#111"}}><MediaPreview url={img}/></div>}
          <div style={{padding:"10px 12px"}}>
            {post.caption&&<div style={{fontSize:12,color:"#222",lineHeight:1.5,marginBottom:5}}>{post.caption}</div>}
            {post.hashtags&&<div style={{fontSize:11,color:"#0A66C2"}}>{post.hashtags}</div>}
          </div>
        </div>
      );
    }

    function FeedTile({ post, index, onSelect, isDragging, dragOver, onDragStart, onDragEnter, onDragEnd }){
      const pl=PLATFORMS[post.platform], img=post.coverUrl||post.mediaUrl;
      const ct=CONTENT_TYPES.find(c=>c.value===post.contentType);
      const ytThumb=img&&getYTThumb(img);
      const [imgErr,setImgErr]=useState(false);
      const [hov,setHov]=useState(false);
      return (
        <div draggable onDragStart={()=>onDragStart(index)} onDragEnter={()=>onDragEnter(index)} onDragEnd={onDragEnd}
          onClick={()=>onSelect(post)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
          style={{position:"relative",aspectRatio:"1/1",borderRadius:10,overflow:"hidden",cursor:"grab",background:"#e8e8e8",
            outline:dragOver?"3px dashed #1a1a1a":"3px solid transparent",opacity:isDragging?0.5:1,
            transition:"transform .15s,opacity .15s",transform:dragOver?"scale(1.03)":"scale(1)"}}>
          {img&&!imgErr
            ? ytThumb
              ? <img src={ytThumb} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={()=>setImgErr(true)}/>
              : /\.(mp4|webm|ogg|mov)(\?|$)/i.test(img)
                ? <video src={img} muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                : <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={()=>setImgErr(true)}/>
            : <div style={{width:"100%",height:"100%",background:"linear-gradient(135deg,#e8e8e8,#d0d0d0)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:32,opacity:.4}}>{ct?.icon||pl.icon}</span>
              </div>
          }
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",opacity:hov?1:0,transition:"opacity .2s",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:8}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:12,textAlign:"center",lineHeight:1.3}}>{post.title}</div>
            <div style={{color:"rgba(255,255,255,.7)",fontSize:10}}>{post.date}</div>
            <div style={{padding:"2px 8px",borderRadius:20,background:STATUS_COLORS[post.status],color:STATUS_TEXT[post.status],fontSize:10,fontWeight:600,marginTop:2}}>{post.status}</div>
          </div>
          <div style={{position:"absolute",top:6,left:6,background:"rgba(0,0,0,.55)",borderRadius:20,padding:"2px 7px",fontSize:10,color:"#fff",fontWeight:600}}>{pl.icon}</div>
          {ct&&ct.value!=="image"&&<div style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,.55)",borderRadius:20,padding:"2px 7px",fontSize:10,color:"#fff"}}>{ct.icon}</div>}
          <div style={{position:"absolute",bottom:6,right:6,background:"rgba(0,0,0,.6)",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:700}}>{index+1}</div>
        </div>
      );
    }

    function FeedGenerator({ posts, onSelectPost }){
      const [feedPlatform,setFeedPlatform]=useState("instagram");
      const [feedOrder,setFeedOrder]=useState(null);
      const [dragIdx,setDragIdx]=useState(null);
      const [dragOver,setDragOver]=useState(null);
      const [manualOrder,setManualOrder]=useState([]);
      const pl=PLATFORMS[feedPlatform];
      const filtered=posts.filter(p=>p.platform===feedPlatform).sort((a,b)=>new Date(a.date)-new Date(b.date));
      useEffect(()=>setManualOrder(filtered.map(p=>p.id)),[feedPlatform,posts.length]);
      const ordered=feedOrder==="manual"?manualOrder.map(id=>filtered.find(p=>p.id===id)).filter(Boolean):filtered;
      function handleDragEnd(){
        if(dragIdx!==null&&dragOver!==null&&dragIdx!==dragOver){
          const arr=[...(feedOrder==="manual"?manualOrder:filtered.map(p=>p.id))];
          const [m]=arr.splice(dragIdx,1); arr.splice(dragOver,0,m);
          setManualOrder(arr); setFeedOrder("manual");
        }
        setDragIdx(null); setDragOver(null);
      }
      const empty=ordered.length===0;
      return (
        <div style={{padding:"24px 32px 40px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700}}>Vista de Feed</div>
              <div style={{fontSize:12,color:"#999",marginTop:2}}>Previsualización del grid · arrastrá para reordenar</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(PLATFORMS).map(([key,p])=>(
                <button key={key} onClick={()=>setFeedPlatform(key)}
                  style={{padding:"8px 18px",borderRadius:24,border:`2px solid ${feedPlatform===key?p.color:"#e0e0e0"}`,background:feedPlatform===key?p.bg:"#fff",color:feedPlatform===key?p.color:"#888",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  {p.icon} {p.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{background:"#fff",borderRadius:18,border:"1.5px solid #ebebeb",overflow:"hidden",marginBottom:24,boxShadow:"0 4px 20px rgba(0,0,0,.06)"}}>
            <div style={{padding:"20px 24px",display:"flex",alignItems:"center",gap:20,borderBottom:"1px solid #f0f0f0"}}>
              <div style={{width:64,height:64,borderRadius:"50%",background:pl.gradientBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{pl.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>tu_cuenta</div>
                <div style={{display:"flex",gap:24,fontSize:13,color:"#555"}}>
                  <span><strong style={{color:"#1a1a1a"}}>{ordered.length}</strong> publicaciones</span>
                  <span><strong style={{color:"#1a1a1a"}}>—</strong> seguidores</span>
                  <span><strong style={{color:"#1a1a1a"}}>—</strong> seguidos</span>
                </div>
              </div>
              <div style={{background:pl.gradientBg,color:"#fff",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700}}>
                {feedPlatform==="instagram"?"Seguir":"Conectar"}
              </div>
            </div>
            {empty
              ? <div style={{padding:60,textAlign:"center",color:"#bbb"}}>
                  <div style={{fontSize:48,marginBottom:12}}>🖼️</div>
                  <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Sin publicaciones todavía</div>
                  <div style={{fontSize:13}}>Agregá posts con portadas para {pl.label} y aparecerán acá</div>
                </div>
              : <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3,padding:3}}>
                  {ordered.map((post,i)=>(
                    <FeedTile key={post.id} post={post} index={i} onSelect={onSelectPost}
                      isDragging={dragIdx===i} dragOver={dragOver===i}
                      onDragStart={i=>setDragIdx(i)} onDragEnter={i=>setDragOver(i)} onDragEnd={handleDragEnd}/>
                  ))}
                  {Array.from({length:(3-(ordered.length%3))%3}).map((_,i)=>(
                    <div key={`ph${i}`} style={{aspectRatio:"1/1",borderRadius:10,background:"#f5f5f5",border:"2px dashed #e5e5e5",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:20,opacity:.25}}>+</span>
                    </div>
                  ))}
                </div>
            }
          </div>
          {!empty&&(
            <>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:16}}>
                <div style={{fontSize:12,color:"#999"}}>{feedOrder==="manual"?"🖱️ Orden manual":"📅 Orden automático por fecha"}</div>
                {feedOrder==="manual"&&<button onClick={()=>{setFeedOrder(null);setManualOrder(filtered.map(p=>p.id));}} style={{padding:"4px 12px",borderRadius:20,border:"1px solid #ddd",background:"#fafafa",fontSize:11,cursor:"pointer",color:"#666"}}>Restablecer orden</button>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
                {STATUS_OPTIONS.map(s=>{ const count=ordered.filter(p=>p.status===s).length; return count>0?(
                  <div key={s} style={{background:"#fff",borderRadius:12,padding:"12px 16px",border:"1.5px solid #ebebeb",display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:10,height:10,borderRadius:2,background:STATUS_COLORS[s],flexShrink:0}}/>
                    <div><div style={{fontSize:18,fontWeight:700,lineHeight:1}}>{count}</div><div style={{fontSize:11,color:"#999",marginTop:2}}>{s}</div></div>
                  </div>
                ):null;})}
              </div>
            </>
          )}
        </div>
      );
    }

    function App(){
      const today=new Date();
      const [year,setYear]=useState(today.getFullYear());
      const [month,setMonth]=useState(today.getMonth());
      const [posts,setPosts]=useState(loadPosts);
      const [modal,setModal]=useState(null);
      const [form,setForm]=useState(EMPTY_FORM);
      const [detailPost,setDetailPost]=useState(null);
      const [filterPlatform,setFilterPlatform]=useState("all");
      const [previewTab,setPreviewTab]=useState("form");
      const [view,setView]=useState("calendario");

      useEffect(()=>savePosts(posts),[posts]);

      const daysInMonth=getDaysInMonth(year,month), firstDay=getFirstDay(year,month);

      const postsForDay=day=>{ const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`; return posts.filter(p=>p.date===ds&&(filterPlatform==="all"||p.platform===filterPlatform)); };
      const openAdd=day=>{ setForm(EMPTY_FORM); setPreviewTab("form"); setModal({day}); };
      const openEdit=post=>{ setDetailPost(null); setForm({platform:post.platform,title:post.title,caption:post.caption,status:post.status,hashtags:post.hashtags||"",contentType:post.contentType||"image",mediaUrl:post.mediaUrl||"",coverUrl:post.coverUrl||""}); setPreviewTab("form"); setModal({day:parseInt(post.date.split("-")[2]),editId:post.id}); };
      const savePost=()=>{ if(!form.title.trim())return; const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(modal.day).padStart(2,"0")}`; modal.editId?setPosts(prev=>prev.map(p=>p.id===modal.editId?{...p,...form,date:ds}:p)):setPosts(prev=>[...prev,{...form,date:ds,id:Date.now()}]); setModal(null); };
      const deletePost=id=>{ setPosts(prev=>prev.filter(p=>p.id!==id)); setDetailPost(null); };
      const prevMonth=()=>month===0?(setMonth(11),setYear(y=>y-1)):setMonth(m=>m-1);
      const nextMonth=()=>month===11?(setMonth(0),setYear(y=>y+1)):setMonth(m=>m+1);

      const monthPosts=posts.filter(p=>{ const d=new Date(p.date+"T00:00:00"); return d.getFullYear()===year&&d.getMonth()===month; });

      const inp = {width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e0e0e0",fontSize:14,outline:"none"};

      return (
        <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:"100vh",background:"#f7f6f2",color:"#1a1a1a"}}>

          {/* HEADER */}
          <div style={{background:"#1a1a1a",color:"#fff",padding:"18px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700}}>Planificador RRSS</div>
              <div style={{fontSize:11,color:"#aaa",marginTop:1}}>Instagram · LinkedIn</div>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{display:"flex",background:"#2a2a2a",borderRadius:24,padding:3,gap:2}}>
                {[{id:"calendario",label:"📅 Calendario"},{id:"feed",label:"🖼️ Feed"}].map(v=>(
                  <button key={v.id} onClick={()=>setView(v.id)}
                    style={{padding:"6px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:view===v.id?"#fff":"transparent",color:view===v.id?"#1a1a1a":"#888",transition:"all .2s"}}>
                    {v.label}
                  </button>
                ))}
              </div>
              {view==="calendario"&&(
                <div style={{display:"flex",gap:5,background:"#2a2a2a",borderRadius:24,padding:3}}>
                  {["all","instagram","linkedin"].map(p=>(
                    <button key={p} onClick={()=>setFilterPlatform(p)}
                      style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filterPlatform===p?"#fff":"transparent",color:filterPlatform===p?"#1a1a1a":"#888",transition:"all .2s"}}>
                      {p==="all"?"Todas":PLATFORMS[p].icon+" "+PLATFORMS[p].label}
                    </button>
                  ))}
                </div>
              )}
              <div style={{background:"#2a2a2a",borderRadius:10,padding:"6px 14px",fontSize:12,color:"#ccc"}}>
                <span style={{color:"#fff",fontWeight:700}}>{monthPosts.length}</span> posts · <span style={{color:"#4caf50",fontWeight:700}}>{monthPosts.filter(p=>p.status==="Publicado").length}</span> publicados
              </div>
            </div>
          </div>

          {/* FEED */}
          {view==="feed"&&<FeedGenerator posts={posts} onSelectPost={setDetailPost}/>}

          {/* CALENDARIO */}
          {view==="calendario"&&(
            <>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,padding:"18px 32px 4px"}}>
                <button onClick={prevMonth} style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:700,minWidth:200,textAlign:"center"}}>{MONTHS[month]} {year}</div>
                <button onClick={nextMonth} style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
              </div>
              <div style={{padding:"12px 32px 28px"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:6}}>
                  {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#999",padding:"6px 0",textTransform:"uppercase",letterSpacing:1}}>{d}</div>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
                  {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`} style={{minHeight:115}}/>)}
                  {Array.from({length:daysInMonth}).map((_,i)=>{
                    const day=i+1, dayPosts=postsForDay(day), isToday=today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===year;
                    return (
                      <div key={day} style={{minHeight:115,background:"#fff",borderRadius:12,padding:"7px 6px",border:isToday?"2px solid #1a1a1a":"1.5px solid #ebebeb",display:"flex",flexDirection:"column",gap:3,transition:"box-shadow .15s"}}
                        onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                          <span style={{fontSize:11,fontWeight:isToday?700:500,background:isToday?"#1a1a1a":"transparent",color:isToday?"#fff":"#555",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center"}}>{day}</span>
                          <button onClick={()=>openAdd(day)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:15,lineHeight:1,padding:0}}>+</button>
                        </div>
                        {dayPosts.slice(0,3).map(post=>{
                          const pl=PLATFORMS[post.platform], ct=CONTENT_TYPES.find(c=>c.value===post.contentType), thumb=post.coverUrl||post.mediaUrl;
                          return (
                            <div key={post.id} onClick={()=>setDetailPost(post)}
                              style={{background:pl.bg,borderLeft:`3px solid ${pl.color}`,borderRadius:5,padding:"2px 5px",fontSize:10,fontWeight:500,cursor:"pointer",overflow:"hidden",color:"#333",display:"flex",alignItems:"center",gap:3}}>
                              {thumb?<img src={convertDriveUrl(thumb)} alt="" style={{width:18,height:18,borderRadius:3,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>:<span style={{flexShrink:0}}>{ct?.icon||pl.icon}</span>}
                              <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{post.title}</span>
                            </div>
                          );
                        })}
                        {dayPosts.length>3&&<div style={{fontSize:9,color:"#bbb",textAlign:"center"}}>+{dayPosts.length-3} más</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
              <div style={{display:"flex",gap:10,padding:"0 32px 28px",flexWrap:"wrap"}}>
                {STATUS_OPTIONS.map(s=>(
                  <div key={s} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#777"}}>
                    <span style={{width:9,height:9,borderRadius:2,background:STATUS_COLORS[s],border:"1px solid #ddd",display:"inline-block"}}/>{s}
                  </div>
                ))}
              </div>
            </>
          )}

          {/* MODAL AGREGAR/EDITAR */}
          {modal&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}} onClick={()=>setModal(null)}>
              <div style={{background:"#fff",borderRadius:18,width:"min(860px,98vw)",maxHeight:"92vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 32px 80px rgba(0,0,0,.25)"}} onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",borderBottom:"1.5px solid #f0f0f0",background:"#fafafa",borderRadius:"18px 18px 0 0"}}>
                  {["form","preview"].map(tab=>(
                    <button key={tab} onClick={()=>setPreviewTab(tab)} style={{flex:1,padding:"13px",border:"none",background:previewTab===tab?"#fff":"transparent",fontWeight:previewTab===tab?700:400,fontSize:13,cursor:"pointer",color:previewTab===tab?"#1a1a1a":"#999",borderBottom:previewTab===tab?"2px solid #1a1a1a":"2px solid transparent"}}>
                      {tab==="form"?"✏️ Editar":"👁️ Vista previa"}
                    </button>
                  ))}
                </div>
                <div style={{overflow:"auto",flex:1}}>
                  {previewTab==="form"?(
                    <div style={{padding:"26px 30px"}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:18}}>{modal.editId?"Editar post":`Nuevo post — ${String(modal.day).padStart(2,"0")} ${MONTHS[month]}`}</div>
                      <div style={{display:"flex",gap:10,marginBottom:14}}>
                        {Object.entries(PLATFORMS).map(([key,pl])=>(
                          <button key={key} onClick={()=>setForm(f=>({...f,platform:key}))} style={{flex:1,padding:"9px",border:`2px solid ${form.platform===key?pl.color:"#e5e5e5"}`,borderRadius:10,cursor:"pointer",background:form.platform===key?pl.bg:"#fafafa",fontWeight:600,fontSize:13,color:form.platform===key?pl.color:"#888"}}>{pl.icon} {pl.label}</button>
                        ))}
                      </div>
                      <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
                        {CONTENT_TYPES.map(c=>(
                          <button key={c.value} onClick={()=>setForm(f=>({...f,contentType:c.value}))} style={{padding:"5px 13px",borderRadius:20,border:`1.5px solid ${form.contentType===c.value?"#1a1a1a":"#e0e0e0"}`,background:form.contentType===c.value?"#1a1a1a":"#fafafa",color:form.contentType===c.value?"#fff":"#777",fontSize:12,fontWeight:600,cursor:"pointer"}}>{c.icon} {c.label}</button>
                        ))}
                      </div>
                      <input placeholder="Título del post *" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={{...inp,marginBottom:11}}/>
                      <textarea placeholder="Caption / texto del post" value={form.caption} onChange={e=>setForm(f=>({...f,caption:e.target.value}))} rows={3} style={{...inp,marginBottom:11,resize:"vertical"}}/>
                      <input placeholder="#hashtags" value={form.hashtags} onChange={e=>setForm(f=>({...f,hashtags:e.target.value}))} style={{...inp,marginBottom:14}}/>
                      {form.contentType!=="text"&&(
                        <div style={{background:"#f7f7f7",borderRadius:12,padding:"16px",marginBottom:14}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}}>🔗 Links de contenido</div>
                          <div style={{fontSize:11,color:"#aaa",marginBottom:10,background:"#fff3e0",borderRadius:6,padding:"6px 10px"}}>
                            💡 Podés pegar links de <strong>Google Drive</strong>, imágenes directas o YouTube
                          </div>
                          <DriveInput
                            label={form.contentType==="video"?"🎬 URL del video":form.contentType==="carousel"?"🎠 URL primera imagen":"🖼️ URL de la imagen"}
                            placeholder={form.contentType==="video"?"https://... (Drive, YouTube, mp4)":"https://... (Drive, jpg, png, webp)"}
                            value={form.mediaUrl}
                            onChange={v=>setForm(f=>({...f,mediaUrl:v}))}
                          />
                          {form.mediaUrl&&<div style={{marginBottom:8,borderRadius:8,overflow:"hidden"}}><MediaPreview url={form.mediaUrl} compact/></div>}
                          <DriveInput
                            label="🎭 URL de portada (aparece en el Feed)"
                            placeholder="https://... imagen de portada — Drive o URL directa"
                            value={form.coverUrl}
                            onChange={v=>setForm(f=>({...f,coverUrl:v}))}
                          />
                          {form.coverUrl&&<div style={{marginTop:4,borderRadius:8,overflow:"hidden"}}><MediaPreview url={form.coverUrl} cover compact/></div>}
                        </div>
                      )}
                      <div style={{marginBottom:22}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:7,textTransform:"uppercase",letterSpacing:.5}}>Estado</div>
                        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                          {STATUS_OPTIONS.map(s=>(
                            <button key={s} onClick={()=>setForm(f=>({...f,status:s}))} style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${form.status===s?"#1a1a1a":"#e0e0e0"}`,background:form.status===s?STATUS_COLORS[s]:"#fafafa",fontWeight:form.status===s?700:400,fontSize:12,cursor:"pointer",color:form.status===s?STATUS_TEXT[s]:"#888"}}>{s}</button>
                          ))}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:9}}>
                        <button onClick={()=>setModal(null)} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #e0e0e0",background:"#fafafa",cursor:"pointer",fontWeight:600,fontSize:13}}>Cancelar</button>
                        <button onClick={()=>setPreviewTab("preview")} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #1a1a1a",background:"#fff",cursor:"pointer",fontWeight:600,fontSize:13}}>👁️ Preview</button>
                        <button onClick={savePost} disabled={!form.title.trim()} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:form.title.trim()?"#1a1a1a":"#ccc",color:"#fff",cursor:form.title.trim()?"pointer":"default",fontWeight:700,fontSize:13}}>{modal.editId?"Guardar cambios":"Agregar post"}</button>
                      </div>
                    </div>
                  ):(
                    <div style={{padding:"26px 30px"}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:6}}>Vista previa del post</div>
                      <div style={{fontSize:12,color:"#aaa",marginBottom:22}}>Así se verá tu publicación en {PLATFORMS[form.platform].label}</div>
                      <div style={{display:"flex",gap:28,flexWrap:"wrap",alignItems:"flex-start"}}>
                        <div style={{flex:"0 0 auto"}}><PostCard post={form}/></div>
                        <div style={{flex:1,minWidth:180}}>
                          <div style={{background:"#f7f7f7",borderRadius:12,padding:14,marginBottom:10}}>
                            <div style={{fontSize:11,color:"#999",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Detalles</div>
                            <div style={{fontSize:13,marginBottom:5}}><strong>Fecha:</strong> {`${String(modal.day).padStart(2,"0")}/${String(month+1).padStart(2,"0")}/${year}`}</div>
                            <div style={{fontSize:13,marginBottom:5}}><strong>Red:</strong> {PLATFORMS[form.platform].icon} {PLATFORMS[form.platform].label}</div>
                            <div style={{fontSize:13,marginBottom:8}}><strong>Tipo:</strong> {CONTENT_TYPES.find(c=>c.value===form.contentType)?.icon} {CONTENT_TYPES.find(c=>c.value===form.contentType)?.label}</div>
                            <span style={{padding:"3px 12px",borderRadius:20,background:STATUS_COLORS[form.status],fontSize:11,fontWeight:700,color:STATUS_TEXT[form.status]}}>{form.status}</span>
                          </div>
                          {form.coverUrl&&<div style={{background:"#f0f7ff",borderRadius:10,padding:10,fontSize:11}}><strong>🎭 Portada aparecerá en el Feed ✓</strong></div>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:9,marginTop:26}}>
                        <button onClick={()=>setPreviewTab("form")} style={{flex:1,padding:"11px",borderRadius:10,border:"1.5px solid #e0e0e0",background:"#fafafa",cursor:"pointer",fontWeight:600,fontSize:13}}>← Volver</button>
                        <button onClick={savePost} disabled={!form.title.trim()} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>{modal.editId?"Guardar cambios":"✓ Confirmar y agregar"}</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* MODAL DETALLE */}
          {detailPost&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}} onClick={()=>setDetailPost(null)}>
              <div style={{background:"#fff",borderRadius:18,width:"min(680px,96vw)",maxHeight:"90vh",overflow:"auto",boxShadow:"0 32px 80px rgba(0,0,0,.25)"}} onClick={e=>e.stopPropagation()}>
                {(()=>{
                  const pl=PLATFORMS[detailPost.platform], ct=CONTENT_TYPES.find(c=>c.value===detailPost.contentType);
                  return (
                    <div style={{padding:"26px"}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:14}}>
                        <div style={{width:38,height:38,borderRadius:"50%",background:pl.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`2px solid ${pl.color}`,flexShrink:0}}>{pl.icon}</div>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,marginBottom:3}}>{detailPost.title}</div>
                          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                            <span style={{fontSize:12,color:pl.color,fontWeight:600}}>{pl.label}</span>
                            {ct&&<span style={{fontSize:11,color:"#999"}}>{ct.icon} {ct.label}</span>}
                            <span style={{padding:"2px 9px",borderRadius:20,background:STATUS_COLORS[detailPost.status],fontSize:11,fontWeight:600,color:STATUS_TEXT[detailPost.status]}}>{detailPost.status}</span>
                          </div>
                        </div>
                        <span style={{fontSize:11,color:"#bbb",flexShrink:0}}>📅 {detailPost.date}</span>
                      </div>
                      {detailPost.mediaUrl&&<div style={{marginBottom:12,borderRadius:12,overflow:"hidden"}}><MediaPreview url={detailPost.mediaUrl}/></div>}
                      {detailPost.coverUrl&&(
                        <div style={{marginBottom:12}}>
                          <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>🎭 Portada / Feed</div>
                          <img src={detailPost.coverUrl} alt="" style={{width:"100%",maxHeight:100,objectFit:"cover",borderRadius:10,display:"block"}} onError={e=>e.target.style.display="none"}/>
                        </div>
                      )}
                      {(detailPost.mediaUrl||detailPost.coverUrl)&&(
                        <div style={{background:"#f7f7f7",borderRadius:10,padding:"9px 13px",marginBottom:12,fontSize:12}}>
                          {detailPost.mediaUrl&&<div style={{marginBottom:detailPost.coverUrl?5:0}}><strong>🔗</strong> <a href={detailPost.mediaUrl} target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",wordBreak:"break-all"}}>{detailPost.mediaUrl}</a></div>}
                          {detailPost.coverUrl&&<div><strong>🎭</strong> <a href={detailPost.coverUrl} target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",wordBreak:"break-all"}}>{detailPost.coverUrl}</a></div>}
                        </div>
                      )}
                      {detailPost.caption&&<div style={{fontSize:13,color:"#333",lineHeight:1.6,background:"#fafafa",borderRadius:8,padding:"10px 12px",marginBottom:9}}>{detailPost.caption}</div>}
                      {detailPost.hashtags&&<div style={{fontSize:12,color:"#0A66C2",marginBottom:14}}>{detailPost.hashtags}</div>}
                      <div style={{display:"flex",gap:9,marginTop:6}}>
                        <button onClick={()=>deletePost(detailPost.id)} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #ffcdd2",background:"#fff3f3",color:"#e53935",cursor:"pointer",fontWeight:600,fontSize:12}}>🗑️ Eliminar</button>
                        <button onClick={()=>openEdit(detailPost)} style={{flex:2,padding:"10px",borderRadius:10,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>✏️ Editar post</button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
