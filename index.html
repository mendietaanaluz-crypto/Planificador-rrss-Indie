  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAWeahDq17yAFFx0dgl15JSOfGxYdCBiR0",
      authDomain: "planning-indie-agency.firebaseapp.com",
      projectId: "planning-indie-agency",

    const db = firebase.firestore();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f7f6f2; color: #1a1a1a; }
    button, input, textarea { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f0f0f0; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    .fade { animation: fi .2s ease; } @keyframes fi { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;
  const PLAT = {
    instagram: { label:"Instagram", color:"#E1306C", bg:"#fce4ec", icon:"\u{1F4F8}", grad:"linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)", url:"https://instagram.com/" },
    linkedin:  { label:"LinkedIn",  color:"#0A66C2", bg:"#e3f2fd", icon:"\u{1F4BC}", grad:"linear-gradient(135deg,#0077b5,#0A66C2,#004182)", url:"https://linkedin.com/in/" },
  };
  const ST_OPT = ["Idea","En redacci\u00f3n","Listo","Publicado"];
  const ST_CLR = {"Idea":"#f0f0f0","En redacci\u00f3n":"#fff9c4","Listo":"#c8e6c9","Publicado":"#bbdefb"};
  const ST_TXT = {"Idea":"#777","En redacci\u00f3n":"#795548","Listo":"#2e7d32","Publicado":"#1565c0"};
  const CT = [{v:"image",l:"Imagen",i:"\u{1F5BC}\uFE0F"},{v:"video",l:"Video",i:"\u{1F3AC}"},{v:"carousel",l:"Carrusel",i:"\u{1F3A0}"},{v:"text",l:"Solo texto",i:"\u270D\uFE0F"}];
  const DAYS = ["Dom","Lun","Mar","Mi\u00e9","Jue","Vie","S\u00e1b"];
  const MON  = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const defaultDB = () => ({ clients: [{ id:"admin", name:"Planning Indie Agency", username:"admin", password:"admin123", accounts:{instagram:"",linkedin:""}, posts:[], color:"#6c5ce7" }] });
  // Firebase helpers
  async function loadDBFromFirebase() {
    try {
      const doc = await db.collection("planificador").doc("main").get();
      if (doc.exists) return doc.data().db;
      return null;
    } catch(e) { console.error("Firebase load error:", e); return null; }
  }
  async function saveDBToFirebase(data) {
    try {
      await db.collection("planificador").doc("main").set({ db: data });
    } catch(e) { console.error("Firebase save error:", e); }
  }
  function driveFileToImg(url) {
    if (!url) return "";
    if (url.includes("lh3.googleusercontent.com")) return url;
    if (url.includes("drive.google.com/uc?")) return url;
    const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m1) return "https://lh3.googleusercontent.com/d/" + m1[1];
    const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m2) return "https://lh3.googleusercontent.com/d/" + m2[1];
    return url;
  }
  function driveFolderId(url) {
    if (!url) return null;
    const m1 = url.match(/\/folders\/([a-zA-Z0-9_-]+)/);
    if (m1) return m1[1];
    const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m2) return m2[1];
    return null;
  }
  const isDrive  = u => u && u.includes("drive.google.com");
  const isFolder = u => u && (u.includes("/folders/") || (u.includes("drive.google.com") && !u.includes("/file/")));
  const isYT     = u => u && (u.includes("youtube.com")||u.includes("youtu.be"));
  const ytThumb  = u => { const m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/); return m?"https://img.youtube.com/vi/"+m[1]+"/mqdefault.jpg":null; };
  const resolve  = u => { if(!u)return ""; if(isDrive(u)&&!isFolder(u))return driveFileToImg(u); return u; };
  const daysIn  = (y,m) => new Date(y,m+1,0).getDate();
  const firstOf = (y,m) => new Date(y,m,1).getDay();
  const EMPTY_POST = {platform:"instagram",title:"",caption:"",status:"Idea",hashtags:"",ctype:"image",driveUrl:"",coverDriveUrl:"",folderUrl:"",carouselImages:[],customDate:""};
  const CLIENT_COLORS = ["#6c5ce7","#e17055","#00b894","#0984e3","#fd79a8","#fdcb6e","#55efc4","#a29bfe"];

  function CoverImg({url, h=200, r=10}) {
    const [err,setErr] = useState(false);
    useEffect(()=>setErr(false),[url]);
    if (!url) return null;
    const src = resolve(url);
    const yt  = isYT(url) ? ytThumb(url) : null;
    const s   = {width:"100%",height:h,objectFit:"cover",borderRadius:r,display:"block"};
    if (yt) return (<div style={{position:"relative",borderRadius:r,overflow:"hidden",height:h}}><img src={yt} alt="" style={s} onError={()=>setErr(true)}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.3)"}}><span style={{fontSize:32}}>&#9654;&#65039;</span></div></div>);
    if (!err) return <img src={src} alt="" style={s} onError={()=>setErr(true)} crossOrigin="anonymous"/>;
    return (<div style={{height:h,borderRadius:r,background:"#f0f0f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6}}><span style={{fontSize:24}}>&#128444;&#65039;</span><div style={{fontSize:10,color:"#aaa",textAlign:"center",padding:"0 10px"}}>{isDrive(url)?"Compartir archivo de Drive como p\u00FAblico":"No se pudo cargar"}</div></div>);
  }

  function CarouselViewer({folderUrl, driveUrls=[]}) {
    const [current, setCurrent] = useState(0);
    const slides = (driveUrls||[]).filter(Boolean).map(u=>resolve(u));
    const folderId = folderUrl ? driveFolderId(folderUrl) : null;
    const embedUrl = folderId ? "https://drive.google.com/embeddedfolderview?id="+folderId+"#grid" : null;
    if (slides.length > 0) return (
      <div style={{background:"#111",borderRadius:12,overflow:"hidden",position:"relative"}}>
        <div style={{position:"relative",height:240,overflow:"hidden"}}>
          <img src={slides[current]} alt="" crossOrigin="anonymous" style={{width:"100%",height:"100%",objectFit:"contain",display:"block"}} onError={e=>e.target.style.opacity=".2"}/>
          {slides.length>1&&<>
            <button onClick={()=>setCurrent(c=>(c-1+slides.length)%slides.length)} style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:30,height:30,color:"#fff",fontSize:16,cursor:"pointer"}}>&#8249;</button>
            <button onClick={()=>setCurrent(c=>(c+1)%slides.length)} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:30,height:30,color:"#fff",fontSize:16,cursor:"pointer"}}>&#8250;</button>
            <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",display:"flex",gap:4}}>
              {slides.map((_,i)=><div key={i} onClick={()=>setCurrent(i)} style={{width:i===current?18:6,height:6,borderRadius:3,background:i===current?"#fff":"rgba(255,255,255,.4)",cursor:"pointer",transition:"width .2s"}}/>)}
            </div>
          </>}
        </div>
        <div style={{background:"rgba(255,255,255,.06)",padding:"5px 12px",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>{current+1} / {slides.length}</span><span style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>&#127904; Carrusel</span></div>
      </div>
    );
    if (embedUrl) return (
      <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e0e0e0"}}>
        <div style={{background:"#f0f0f0",padding:"7px 12px",fontSize:11,color:"#666",display:"flex",alignItems:"center",gap:6}}>
          &#127904; Carpeta de Drive <a href={folderUrl} target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",marginLeft:"auto"}}>Abrir &#8599;</a>
        </div>
        <iframe src={embedUrl} width="100%" height="200" frameBorder="0" style={{display:"block"}}/>
      </div>
    );
    return null;
  }

  function DrvField({label, value, onChange, ph, hint, isCarousel=false}) {
    const drive=isDrive(value), folder=isFolder(value);
    const color=drive?(folder&&isCarousel?"#0984e3":"#34a853"):"#e0e0e0";
    return (
      <div style={{marginBottom:10}}>
        {label&&<div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:5}}>{label}</div>}
        <input value={value} onChange={e=>onChange(e.target.value)} placeholder={ph||"Peg\u00E1 el link de Drive..."}
          style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid "+color,fontSize:12,outline:"none",background:"#fff"}}/>
        {drive&&folder&&isCarousel&&<div style={{fontSize:10,color:"#0984e3",marginTop:3}}>&#128193; Carpeta de Drive detectada</div>}
        {drive&&!folder&&<div style={{fontSize:10,color:"#34a853",marginTop:3}}>&#10003; Archivo de Drive detectado</div>}
        {hint&&<div style={{fontSize:10,color:"#aaa",marginTop:3}}>{hint}</div>}
      </div>
    );
  }

  function LoginScreen({clients, onLogin}) {
    const [user,setUser]=useState(""), [pass,setPass]=useState(""), [err,setErr]=useState(""), [show,setShow]=useState(false);
    function doLogin(){
      const c=clients.find(c=>c.username===user.trim()&&c.password===pass);
      if(c){setErr("");onLogin(c.id,"editor");}
      else setErr("Usuario o contrase\u00F1a incorrectos");
    }
    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#fff",borderRadius:24,padding:"40px 36px",width:"min(400px,96vw)",boxShadow:"0 32px 80px rgba(0,0,0,.4)"}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:34,marginBottom:8}}>&#128197;</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,marginBottom:5}}>Planificador RRSS</div>
            <div style={{fontSize:12,color:"#aaa"}}>Ingres\u00E1 con tus credenciales</div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>Usuario</div>
            <input value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="tu_usuario" style={{width:"100%",padding:"11px 14px",borderRadius:10,border:"1.5px solid #e0e0e0",fontSize:14,outline:"none"}}/>
          </div>
          <div style={{marginBottom:18}}>
            <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:5}}>Contrase\u00F1a</div>
            <div style={{position:"relative"}}>
              <input value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} type={show?"text":"password"} placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" style={{width:"100%",padding:"11px 40px 11px 14px",borderRadius:10,border:"1.5px solid "+(err?"#e53935":"#e0e0e0"),fontSize:14,outline:"none"}}/>
              <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:15,color:"#aaa"}}>{show?"\uD83D\uDE48":"\uD83D\uDC41\uFE0F"}</button>
            </div>
          </div>
          {err&&<div style={{background:"#fff3f3",border:"1px solid #ffcdd2",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#e53935",marginBottom:14}}>{err}</div>}
          <button onClick={doLogin} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:"#1a1a1a",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:10}}>Ingresar &#8594;</button>

          {/* Selector de cliente para vista invitado */}
          <div style={{borderTop:"1px solid #f0f0f0",paddingTop:14,marginTop:4}}>
            <div style={{fontSize:11,color:"#aaa",textAlign:"center",marginBottom:10}}>&#128100; Entrar como invitado (solo lectura)</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {clients.map(c=>(
                <button key={c.id} onClick={()=>onLogin(c.id,"guest")}
                  style={{padding:"8px 14px",borderRadius:10,border:"1.5px solid #e8e8e8",background:"#fafafa",cursor:"pointer",fontSize:12,fontWeight:600,color:"#555",display:"flex",alignItems:"center",gap:8,transition:"background .15s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f0f0f0"} onMouseLeave={e=>e.currentTarget.style.background="#fafafa"}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:c.color||"#6c5ce7",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:10,flexShrink:0}}>{c.name.charAt(0).toUpperCase()}</div>
                  {c.name}
                  <span style={{marginLeft:"auto",fontSize:10,color:"#bbb",background:"#ebebeb",borderRadius:6,padding:"2px 6px"}}>invitado</span>
                </button>
              ))}
            </div>
          </div>

          <div style={{marginTop:14,textAlign:"center",fontSize:11,color:"#ccc"}}>{clients.length} cliente{clients.length!==1?"s":""} registrado{clients.length!==1?"s":""}</div>
        </div>
      </div>
    );
  }

  function AdminPanel({db, onSave, onClose}) {
    const [clients,setClients]=useState(JSON.parse(JSON.stringify(db.clients)));
    const [editing,setEditing]=useState(null);
    const [newC,setNewC]=useState({name:"",username:"",password:"",color:CLIENT_COLORS[0]});
    const [showNew,setShowNew]=useState(false);
    function addClient(){if(!newC.name||!newC.username||!newC.password)return;const c={...newC,id:Date.now().toString(),accounts:{instagram:"",linkedin:""},posts:[]};setClients(p=>[...p,c]);setNewC({name:"",username:"",password:"",color:CLIENT_COLORS[clients.length%CLIENT_COLORS.length]});setShowNew(false);}
    function delClient(id){if(id==="admin")return;setClients(p=>p.filter(c=>c.id!==id));}
    function upd(id,f,v){setClients(p=>p.map(c=>c.id===id?{...c,[f]:v}:c));}
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}} onClick={onClose}>
        <div style={{background:"#fff",borderRadius:20,width:"min(580px,98vw)",maxHeight:"88vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 32px 80px rgba(0,0,0,.3)"}} onClick={e=>e.stopPropagation()}>
          <div style={{padding:"20px 24px",borderBottom:"1.5px solid #f0f0f0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700}}>Gesti\u00F3n de clientes</div><div style={{fontSize:11,color:"#aaa",marginTop:2}}>Administr\u00E1 usuarios y accesos</div></div>
            <button onClick={()=>setShowNew(s=>!s)} style={{padding:"7px 14px",borderRadius:10,border:"none",background:"#1a1a1a",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Nuevo</button>
          </div>
          <div style={{overflow:"auto",flex:1,padding:"14px 24px"}}>
            {showNew&&(
              <div style={{background:"#f8f8f8",borderRadius:14,padding:16,marginBottom:16,border:"2px dashed #ddd"}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Nuevo cliente</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:10}}>
                  {[{f:"name",l:"Nombre"},{f:"username",l:"Usuario"},{f:"password",l:"Contrase\u00F1a"}].map(({f,l})=>(
                    <div key={f}><div style={{fontSize:10,fontWeight:600,color:"#666",marginBottom:3}}>{l}</div><input value={newC[f]} onChange={e=>setNewC(n=>({...n,[f]:e.target.value}))} style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1.5px solid #e0e0e0",fontSize:12,outline:"none"}}/></div>
                  ))}
                  <div><div style={{fontSize:10,fontWeight:600,color:"#666",marginBottom:3}}>Color</div><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{CLIENT_COLORS.map(c=><div key={c} onClick={()=>setNewC(n=>({...n,color:c}))} style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",border:newC.color===c?"3px solid #1a1a1a":"2px solid transparent"}}/>)}</div></div>
                </div>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={()=>setShowNew(false)} style={{flex:1,padding:"8px",borderRadius:8,border:"1.5px solid #e0e0e0",background:"#fafafa",cursor:"pointer",fontSize:12}}>Cancelar</button>
                  <button onClick={addClient} disabled={!newC.name||!newC.username||!newC.password} style={{flex:2,padding:"8px",borderRadius:8,border:"none",background:newC.name&&newC.username&&newC.password?"#1a1a1a":"#ccc",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>Crear cliente</button>
                </div>
              </div>
            )}
            {clients.map(c=>(
              <div key={c.id} style={{background:"#fafafa",borderRadius:12,padding:14,marginBottom:9,border:"1.5px solid #ebebeb"}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:c.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0}}>{c.name.charAt(0).toUpperCase()}</div>
                  <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{c.name}</div><div style={{fontSize:10,color:"#aaa"}}>@{c.username} &middot; {c.posts?.length||0} posts</div></div>
                  <button onClick={()=>setEditing(editing===c.id?null:c.id)} style={{padding:"4px 11px",borderRadius:7,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:11}}>{editing===c.id?"Cerrar":"&#9998; Editar"}</button>
                  {c.id!=="admin"&&<button onClick={()=>delClient(c.id)} style={{padding:"4px 9px",borderRadius:7,border:"1px solid #ffcdd2",background:"#fff3f3",cursor:"pointer",fontSize:11,color:"#e53935"}}>&#128465;&#65039;</button>}
                </div>
                {editing===c.id&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,paddingTop:10,borderTop:"1px solid #e8e8e8",marginTop:10}}>
                    {[{f:"name",l:"Nombre"},{f:"username",l:"Usuario"},{f:"password",l:"Contrase\u00F1a"}].map(({f,l})=>(
                      <div key={f}><div style={{fontSize:10,fontWeight:600,color:"#888",marginBottom:3}}>{l}</div><input value={c[f]} onChange={e=>upd(c.id,f,e.target.value)} style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1.5px solid #e0e0e0",fontSize:12,outline:"none"}}/></div>
                    ))}
                    <div><div style={{fontSize:10,fontWeight:600,color:"#888",marginBottom:3}}>Color</div><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{CLIENT_COLORS.map(col=><div key={col} onClick={()=>upd(c.id,"color",col)} style={{width:19,height:19,borderRadius:"50%",background:col,cursor:"pointer",border:c.color===col?"3px solid #1a1a1a":"2px solid transparent"}}/>)}</div></div>
                  </div>
                )}
              </div>
            ))}
          </div>
          <div style={{padding:"14px 24px",borderTop:"1.5px solid #f0f0f0",display:"flex",gap:8}}>
            <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #e0e0e0",background:"#fafafa",cursor:"pointer",fontWeight:600,fontSize:13}}>Cancelar</button>
            <button onClick={()=>onSave({...db,clients})} style={{flex:2,padding:"10px",borderRadius:10,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>Guardar cambios</button>
          </div>
        </div>
      </div>
    );
  }

  function Tile({post,idx,onSelect,isDrag,isDragOver,onDragStart,onDragEnter,onDragEnd}) {
    const [hov,setHov]=useState(false),[err,setErr]=useState(false);
    const pl=PLAT[post.platform],ct=CT.find(c=>c.v===post.ctype),raw=post.coverDriveUrl||post.driveUrl,src=resolve(raw);
    return (
      <div draggable onDragStart={()=>onDragStart(idx)} onDragEnter={()=>onDragEnter(idx)} onDragEnd={onDragEnd} onClick={()=>onSelect(post)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{position:"relative",aspectRatio:"1/1",borderRadius:2,overflow:"hidden",cursor:"pointer",background:"#f0f0f0",outline:isDragOver?"3px dashed #1a1a1a":"none",opacity:isDrag?0.4:1,transition:"opacity .15s"}}>
        {raw&&!err?<img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={()=>setErr(true)} crossOrigin="anonymous"/>:<div style={{width:"100%",height:"100%",background:"linear-gradient(135deg,"+pl.bg+",#fff)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:28,opacity:.25}}>{ct?.i||pl.icon}</span></div>}

  function FeedView({posts,acc,onSelect}) {

  function DetailModal({post,onEdit,onDelete,onClose,isGuest=false,onSaveNote}) {

    const [showNameInput,setShowNameInput]=useState(false);

    function addNote(){
      if(!newNote.trim()) return;
      const author = authorName.trim()||"Invitado";
      const note = {id:Date.now(), text:newNote.trim(), author, date:new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})};
      const updated=[...notes, note];
      setNotes(updated);
      setNewNote("");
      onSaveNote(post.id, updated);
    }
    function deleteNote(id){
      const updated=notes.filter(n=>n.id!==id);
      setNotes(updated);
      onSaveNote(post.id, updated);

      localStorage.setItem("rrss_guest_name", authorName.trim());
      setShowNameInput(false);

              <div style={{background:"#f7f7f7",borderRadius:10,padding:"8px 11px",marginBottom:9,fontSize:11}}>
                {(post.folderUrl||post.driveUrl)&&<div style={{marginBottom:3}}><strong>{isC?"&#128193; Carpeta:":"&#128279; Archivo:"}</strong> <a href={post.folderUrl||post.driveUrl} target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",wordBreak:"break-all"}}>{(post.folderUrl||post.driveUrl).slice(0,55)}&#8230;</a></div>}
                {post.coverDriveUrl&&<div><strong>&#127917; Portada:</strong> <a href={post.coverDriveUrl} target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",wordBreak:"break-all"}}>{post.coverDriveUrl.slice(0,55)}&#8230;</a></div>}
              </div>
            )}

            {post.caption&&<div style={{fontSize:12,color:"#333",lineHeight:1.6,background:"#fafafa",borderRadius:8,padding:"8px 11px",marginBottom:6}}>{post.caption}</div>}
            {post.hashtags&&<div style={{fontSize:11,color:"#0A66C2",marginBottom:12}}>{post.hashtags}</div>}

            {/* NOTAS Y COMENTARIOS — visible para todos */}
            <div style={{borderTop:"1.5px solid #f0f0f0",paddingTop:14,marginTop:6}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:700,color:"#444"}}>&#128172; Notas y comentarios ({notes.length})</div>
                {isGuest&&(
                  <button onClick={()=>setShowNameInput(s=>!s)} style={{fontSize:10,padding:"3px 9px",borderRadius:20,border:"1px solid #ddd",background:"#fafafa",cursor:"pointer",color:"#888"}}>
                    &#128100; {authorName||"Sin nombre"} &#9998;
                  </button>
                )}
              </div>

              {/* Cambiar nombre de invitado */}
              {isGuest&&showNameInput&&(
                <div style={{background:"#f0f7ff",borderRadius:10,padding:10,marginBottom:10,display:"flex",gap:7,alignItems:"center"}}>
                  <input value={authorName} onChange={e=>setAuthorName(e.target.value)} placeholder="Tu nombre"
                    style={{flex:1,padding:"7px 10px",borderRadius:7,border:"1.5px solid #c0d8f0",fontSize:12,outline:"none"}}
                    onKeyDown={e=>e.key==="Enter"&&saveName()}/>
                  <button onClick={saveName} style={{padding:"7px 12px",borderRadius:7,border:"none",background:"#0984e3",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>OK</button>
                </div>
              )}

              {/* Lista de notas */}
              {notes.length===0&&(
                <div style={{textAlign:"center",padding:"14px 0",fontSize:12,color:"#ccc"}}>Todavía no hay comentarios. ¡Sé el primero!</div>
              )}
              {notes.map(n=>(
                <div key={n.id} style={{background:"#fafafa",borderRadius:10,padding:"10px 12px",marginBottom:8,border:"1.5px solid #f0f0f0"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:"#e0e0e0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#666"}}>{n.author.charAt(0).toUpperCase()}</div>
                      <span style={{fontSize:11,fontWeight:700,color:"#444"}}>{n.author}</span>
                      <span style={{fontSize:9,color:"#bbb"}}>{n.date}</span>
                    </div>
                    {!isGuest&&<button onClick={()=>deleteNote(n.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#ddd",padding:"0 3px"}} title="Eliminar nota">&#10005;</button>}
                  </div>
                  <div style={{fontSize:12,color:"#333",lineHeight:1.5}}>{n.text}</div>
                </div>
              ))}

              {/* Input nueva nota — disponible para todos */}
              <div style={{display:"flex",gap:7,alignItems:"flex-end",marginTop:8}}>
                <textarea
                  value={newNote} onChange={e=>setNewNote(e.target.value)}
                  placeholder={isGuest?"Dejá tu comentario como "+(authorName||"invitado")+"...":"Agregá una nota interna..."}
                  rows={2}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addNote();}}}
                  style={{flex:1,padding:"9px 11px",borderRadius:9,border:"1.5px solid #e0e0e0",fontSize:12,resize:"none",outline:"none",fontFamily:"'DM Sans',sans-serif"}}/>
                <button onClick={addNote} disabled={!newNote.trim()}
                  style={{padding:"9px 14px",borderRadius:9,border:"none",background:newNote.trim()?"#1a1a1a":"#e0e0e0",color:newNote.trim()?"#fff":"#aaa",fontWeight:700,fontSize:12,cursor:newNote.trim()?"pointer":"default",flexShrink:0}}>
                  Enviar
                </button>
              </div>
            </div>

            {/* Botones editor */}
            <div style={{marginTop:14}}>
              {!isGuest&&<div style={{display:"flex",gap:7}}>
                <button onClick={()=>onDelete(post.id)} style={{flex:1,padding:"9px",borderRadius:10,border:"1.5px solid #ffcdd2",background:"#fff3f3",color:"#e53935",cursor:"pointer",fontWeight:600,fontSize:12}}>&#128465;&#65039; Eliminar</button>
                <button onClick={()=>onEdit(post)} style={{flex:2,padding:"9px",borderRadius:10,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>&#9998;&#65039; Editar</button>
              </div>}
            </div>
          </div>
        </div>
      </div>
    );
  }

  function AccSettings({acc,onSave,onClose}) {
    const [ig,setIg]=useState(acc.instagram||""),[li,setLi]=useState(acc.linkedin||"");
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}} onClick={onClose}>
        <div style={{background:"#fff",borderRadius:18,width:"min(360px,96vw)",padding:26,boxShadow:"0 24px 60px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:4}}>Cuentas de redes</div>
          <div style={{fontSize:12,color:"#aaa",marginBottom:18}}>Vincul\u00E1 tus perfiles</div>
          {[{k:"instagram",icon:"&#128248;",color:"#E1306C",val:ig,set:setIg,base:"instagram.com/"},{k:"linkedin",icon:"&#128188;",color:"#0A66C2",val:li,set:setLi,base:"linkedin.com/in/"}].map(p=>(
            <div key={p.k} style={{marginBottom:13}}>
              <div style={{fontSize:12,fontWeight:700,color:"#444",marginBottom:5}} dangerouslySetInnerHTML={{__html:p.icon+" "+p.k.charAt(0).toUpperCase()+p.k.slice(1)}}/>
              <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:12,color:"#aaa",fontWeight:600}}>@</span><input value={p.val} onChange={e=>p.set(e.target.value)} placeholder="tu_usuario" style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1.5px solid #e0e0e0",fontSize:13,outline:"none"}}/></div>
              {p.val&&<div style={{fontSize:10,color:p.color,marginTop:3}}>&#8594; {p.base}{p.val.replace(/^@/,"")}</div>}
            </div>
          ))}
          <div style={{display:"flex",gap:7,marginTop:14}}>
            <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #e0e0e0",background:"#fafafa",cursor:"pointer",fontWeight:600,fontSize:13}}>Cancelar</button>
            <button onClick={()=>onSave({instagram:ig.replace(/^@/,"").trim(),linkedin:li.replace(/^@/,"").trim()})} style={{flex:2,padding:"10px",borderRadius:10,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>Guardar</button>
          </div>
        </div>
      </div>
    );
  }

  function App() {
    const [dbData,setDbRaw]=useState(null); // null = loading
    const [session,setSession]=useState(null);
    const [modal,setModal]=useState(null);
    const [form,setForm]=useState({...EMPTY_POST});
    const [detail,setDetail]=useState(null);
    const [filterP,setFilterP]=useState("all");
    const [view,setView]=useState("calendario");
    const [showAcc,setShowAcc]=useState(false);
    const [showAdmin,setShowAdmin]=useState(false);
    const [saving,setSaving]=useState(false);
    const today=new Date();
    const [year,setYear]=useState(today.getFullYear());
    const [month,setMonth]=useState(today.getMonth());

    // Load from Firebase on mount + real-time listener
    useEffect(()=>{
      const unsub = db.collection("planificador").doc("main").onSnapshot(doc=>{
        if(doc.exists){ setDbRaw(doc.data().db); }
        else { const def=defaultDB(); setDbRaw(def); saveDBToFirebase(def); }
      }, err=>{ console.error(err); setDbRaw(defaultDB()); });
      return ()=>unsub();
    },[]);

    async function setDb(v){
      setDbRaw(v);
      setSaving(true);
      await saveDBToFirebase(v);
      setSaving(false);
    }
    function updClient(id,fn){setDb({...dbData,clients:dbData.clients.map(c=>c.id===id?fn(c):c)});}
    const db2 = dbData; // alias para no confundir con firebase db
    // Show loading while Firebase loads
    if(!db2) return (
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a1a,#2d2d2d)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
        <div style={{fontSize:36}}>&#128197;</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#fff"}}>Planificador RRSS</div>
        <div style={{fontSize:13,color:"#888"}}>Conectando con la base de datos...</div>
        <div style={{width:40,height:40,borderRadius:"50%",border:"3px solid #333",borderTop:"3px solid #fff",animation:"spin 1s linear infinite"}}/>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
    const client=db2.clients.find(c=>c.id===session?.id);
    const isGuest = session?.role==="guest";
    if(!session) return <LoginScreen clients={db2.clients} onLogin={(id,role)=>setSession({id,role})}/>;
    if(!client){setSession(null);return null;}
    const posts=client.posts||[],acc=client.accounts||{instagram:"",linkedin:""};
    const dim=daysIn(year,month),fd=firstOf(year,month);
    const pfDay=day=>{const ds=year+"-"+String(month+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");return posts.filter(p=>p.date===ds&&(filterP==="all"||p.platform===filterP));};
    const openAdd=day=>{if(isGuest)return;setForm({...EMPTY_POST});setModal({day});};
    const openEdit=post=>{if(isGuest)return;setDetail(null);setForm({platform:post.platform,title:post.title,caption:post.caption,status:post.status,hashtags:post.hashtags||"",ctype:post.ctype||"image",driveUrl:post.driveUrl||"",coverDriveUrl:post.coverDriveUrl||"",folderUrl:post.folderUrl||"",carouselImages:post.carouselImages||[],customDate:post.date||""});setModal({day:parseInt(post.date.split("-")[2]),editId:post.id});};
    const save=()=>{if(!form.title.trim())return;const ds=form.customDate||year+"-"+String(month+1).padStart(2,"0")+"-"+String(modal.day).padStart(2,"0");updClient(client.id,c=>({...c,posts:modal.editId?c.posts.map(p=>p.id===modal.editId?{...p,...form,date:ds}:p):[...(c.posts||[]),{...form,date:ds,id:Date.now()}]}));setModal(null);};
    const del=id=>{if(isGuest)return;updClient(client.id,c=>({...c,posts:c.posts.filter(p=>p.id!==id)}));setDetail(null);};
    const saveNote=(postId,notes)=>{updClient(client.id,c=>({...c,posts:c.posts.map(p=>p.id===postId?{...p,notes}:p)}));setDetail(d=>d&&d.id===postId?{...d,notes}:d);};
    const prev=()=>month===0?(setMonth(11),setYear(y=>y-1)):setMonth(m=>m-1);
    const next=()=>month===11?(setMonth(0),setYear(y=>y+1)):setMonth(m=>m+1);
    const mPosts=posts.filter(p=>{const d=new Date(p.date+"T00:00:00");return d.getFullYear()===year&&d.getMonth()===month;});
    return (
      <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:"100vh",background:"#f7f6f2"}}>
        <div style={{background:"#1a1a1a",color:"#fff",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:9,flexWrap:"wrap",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 12px rgba(0,0,0,.3)"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:client.color||"#6c5ce7",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0}}>{client.name.charAt(0).toUpperCase()}</div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,lineHeight:1}}>{client.name}</div>
              <div style={{fontSize:9,color:"#666",marginTop:1}}>Planificador RRSS</div>
            </div>
            {isGuest&&<span style={{background:"#f0a500",color:"#fff",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700}}>&#128100; Invitado</span>}
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            <div style={{display:"flex",background:"#2a2a2a",borderRadius:20,padding:"3px",gap:2}}>
              {[{id:"calendario",l:"&#128197;"},{id:"feed",l:"&#128444;&#65039; Feed"}].map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{padding:"4px 10px",borderRadius:17,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:view===v.id?"#fff":"transparent",color:view===v.id?"#1a1a1a":"#777",transition:"all .2s"}} dangerouslySetInnerHTML={{__html:v.l}}/>)}
            </div>
            {view==="calendario"&&<div style={{display:"flex",gap:3,background:"#2a2a2a",borderRadius:20,padding:"3px"}}>{["all","instagram","linkedin"].map(p=><button key={p} onClick={()=>setFilterP(p)} style={{padding:"3px 8px",borderRadius:17,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filterP===p?"#fff":"transparent",color:filterP===p?"#1a1a1a":"#777"}}>{p==="all"?"Todas":PLAT[p].icon}</button>)}</div>}
            {acc.instagram&&<a href={"https://instagram.com/"+acc.instagram} target="_blank" rel="noopener noreferrer" style={{background:"#E1306C",color:"#fff",borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,textDecoration:"none"}}>&#128248; @{acc.instagram}</a>}
            {acc.linkedin&&<a href={"https://linkedin.com/in/"+acc.linkedin} target="_blank" rel="noopener noreferrer" style={{background:"#0A66C2",color:"#fff",borderRadius:6,padding:"4px 8px",fontSize:10,fontWeight:700,textDecoration:"none"}}>&#128188; @{acc.linkedin}</a>}
            {!isGuest&&<button onClick={()=>setShowAcc(true)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #333",background:"transparent",color:"#999",fontSize:10,cursor:"pointer"}}>&#128279; Cuentas</button>}
            {!isGuest&&client.id==="admin"&&<button onClick={()=>setShowAdmin(true)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #444",background:"transparent",color:"#bbb",fontSize:10,cursor:"pointer"}}>&#128101; Clientes</button>}
            <div style={{background:"#2a2a2a",borderRadius:6,padding:"4px 8px",fontSize:10,color:"#ccc"}}><span style={{color:"#fff",fontWeight:700}}>{mPosts.length}</span> <span style={{color:"#4caf50",fontWeight:700}}>{mPosts.filter(p=>p.status==="Publicado").length}</span> pub.</div>
            {saving&&<div style={{fontSize:10,color:"#f0a500",display:"flex",alignItems:"center",gap:4}}>&#9729;&#65039; Guardando...</div>}
            <button onClick={()=>setSession(null)} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #333",background:"transparent",color:"#666",fontSize:10,cursor:"pointer"}} title="Cerrar sesi\u00F3n">&#8617;&#65039;</button>
          </div>
        </div>
        {view==="feed"&&<FeedView posts={posts} acc={acc} onSelect={setDetail}/>}
        {view==="calendario"&&(
          <div className="fade">
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:13,padding:"13px 20px 4px"}}>
              <button onClick={prev} style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>&#8249;</button>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,minWidth:175,textAlign:"center"}}>{MON[month]} {year}</div>
              <button onClick={next} style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>&#8250;</button>
            </div>
            <div style={{padding:"7px 20px 22px"}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>{DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,color:"#aaa",padding:"4px 0",textTransform:"uppercase",letterSpacing:1}}>{d}</div>)}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                {Array.from({length:fd}).map((_,i)=><div key={"e"+i} style={{minHeight:100}}/>)}
                {Array.from({length:dim}).map((_,i)=>{
                  const day=i+1,dp=pfDay(day),isT=today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===year;
                  return (
                    <div key={day} style={{minHeight:100,background:"#fff",borderRadius:9,padding:"5px 4px",border:isT?"2px solid #1a1a1a":"1.5px solid #ebebeb",display:"flex",flexDirection:"column",gap:3,transition:"box-shadow .15s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 13px rgba(0,0,0,.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:1}}>
                        <span style={{fontSize:10,fontWeight:isT?700:500,background:isT?"#1a1a1a":"transparent",color:isT?"#fff":"#666",borderRadius:"50%",width:17,height:17,display:"flex",alignItems:"center",justifyContent:"center"}}>{day}</span>
                        {!isGuest&&<button onClick={()=>openAdd(day)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:12,lineHeight:1,padding:0}}>+</button>}
                      </div>
                      {dp.slice(0,3).map(post=>{
                        const pl=PLAT[post.platform],ct=CT.find(c=>c.v===post.ctype),thumb=resolve(post.coverDriveUrl||post.driveUrl);
                        return <div key={post.id} onClick={()=>setDetail(post)} style={{background:pl.bg,borderLeft:"3px solid "+pl.color,borderRadius:4,padding:"2px 3px",fontSize:9,fontWeight:500,cursor:"pointer",color:"#333",display:"flex",alignItems:"center",gap:2,overflow:"hidden"}}>
                          {thumb?<img src={thumb} alt="" style={{width:13,height:13,borderRadius:2,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"} crossOrigin="anonymous"/>:<span style={{flexShrink:0,fontSize:9}}>{ct?.i||pl.icon}</span>}
                          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{post.title}</span>
                        </div>;
                      })}
                      {dp.length>3&&<div style={{fontSize:8,color:"#bbb",textAlign:"center"}}>+{dp.length-3}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{display:"flex",gap:7,padding:"0 20px 18px",flexWrap:"wrap"}}>{ST_OPT.map(s=><div key={s} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:"#888"}}><span style={{width:7,height:7,borderRadius:2,background:ST_CLR[s],border:"1px solid #ddd",display:"inline-block"}}/>{s}</div>)}</div>
          </div>
        )}
        {modal&&!isGuest&&<PostModal modal={modal} month={month} year={year} form={form} setForm={setForm} onSave={save} onClose={()=>setModal(null)}/>}
        {detail&&<DetailModal post={detail} onEdit={openEdit} onDelete={del} onClose={()=>setDetail(null)} isGuest={isGuest} onSaveNote={saveNote}/>}
        {showAcc&&!isGuest&&<AccSettings acc={acc} onSave={a=>{updClient(client.id,c=>({...c,accounts:a}));setShowAcc(false);}} onClose={()=>setShowAcc(false)}/>}
        {showAdmin&&!isGuest&&<AdminPanel db={db2} onSave={nd=>{setDb(nd);setShowAdmin(false);}} onClose={()=>setShowAdmin(false)}/>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
