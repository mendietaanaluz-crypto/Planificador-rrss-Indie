// ── URL HELPERS ───────────────────────────────────────────────────────────────
function driveFileToImg(u){
  if(!u)return"";
  if(u.includes("lh3.googleusercontent.com"))return u;
  if(u.includes("drive.google.com/uc?"))return u;
  const m1=u.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);if(m1)return"https://lh3.googleusercontent.com/d/"+m1[1];
  const m2=u.match(/[?&]id=([a-zA-Z0-9_-]+)/);if(m2)return"https://lh3.googleusercontent.com/d/"+m2[1];
  return u;
}
function driveFolderId(u){if(!u)return null;const m1=u.match(/\/folders\/([a-zA-Z0-9_-]+)/);if(m1)return m1[1];const m2=u.match(/[?&]id=([a-zA-Z0-9_-]+)/);return m2?m2[1]:null;}
const isDrive=u=>u&&u.includes("drive.google.com");
const isFolder=u=>u&&(u.includes("/folders/")||(u.includes("drive.google.com")&&!u.includes("/file/")));
const isYT=u=>u&&(u.includes("youtube.com")||u.includes("youtu.be"));
const ytThumb=u=>{const m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/);return m?"https://img.youtube.com/vi/"+m[1]+"/mqdefault.jpg":null;};
const resolve=u=>{if(!u)return"";if(isDrive(u)&&!isFolder(u))return driveFileToImg(u);return u;};
const daysIn=(y,m)=>new Date(y,m+1,0).getDate();
const firstOf=(y,m)=>new Date(y,m,1).getDay();

// ── COVER IMAGE ───────────────────────────────────────────────────────────────
function CoverImg({url,h=200,r=10}){
  const[err,setErr]=useState(false);
  useEffect(()=>setErr(false),[url]);
  if(!url)return null;
  const src=resolve(url),yt=isYT(url)?ytThumb(url):null;
  const s={width:"100%",height:h,objectFit:"cover",borderRadius:r,display:"block"};
  if(yt)return(<div style={{position:"relative",borderRadius:r,overflow:"hidden",height:h}}><img src={yt} alt="" style={s} onError={()=>setErr(true)}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.3)"}}><span style={{fontSize:32}}>\u25B6\uFE0F</span></div></div>);
  if(!err)return<img src={src} alt="" style={s} onError={()=>setErr(true)} crossOrigin="anonymous"/>;
  return(<div style={{height:h,borderRadius:r,background:"#f0f0f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6}}><span style={{fontSize:22}}>\uD83D\uDDBC\uFE0F</span><div style={{fontSize:9,color:"#aaa",textAlign:"center",padding:"0 8px"}}>{isDrive(url)?"Compart\u00ED el archivo de Drive como p\u00FAblico":"No se pudo cargar"}</div></div>);
}

// ── CAROUSEL VIEWER ───────────────────────────────────────────────────────────
function CarouselViewer({folderUrl,driveUrls=[]}){
  const[cur,setCur]=useState(0);
  const slides=(driveUrls||[]).filter(Boolean).map(u=>resolve(u));
  const fid=folderUrl?driveFolderId(folderUrl):null;
  const emb=fid?"https://drive.google.com/embeddedfolderview?id="+fid+"#grid":null;
  if(slides.length>0)return(
    <div style={{background:"#111",borderRadius:12,overflow:"hidden"}}>
      <div style={{position:"relative",height:230}}>
        <img src={slides[cur]} alt="" crossOrigin="anonymous" style={{width:"100%",height:"100%",objectFit:"contain",display:"block"}} onError={e=>e.target.style.opacity=".2"}/>
        {slides.length>1&&<>
          <button onClick={()=>setCur(c=>(c-1+slides.length)%slides.length)} style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:28,height:28,color:"#fff",fontSize:15,cursor:"pointer"}}>\u2039</button>
          <button onClick={()=>setCur(c=>(c+1)%slides.length)} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.2)",border:"none",borderRadius:"50%",width:28,height:28,color:"#fff",fontSize:15,cursor:"pointer"}}>\u203A</button>
          <div style={{position:"absolute",bottom:6,left:"50%",transform:"translateX(-50%)",display:"flex",gap:4}}>
            {slides.map((_,i)=><div key={i} onClick={()=>setCur(i)} style={{width:i===cur?16:5,height:5,borderRadius:3,background:i===cur?"#fff":"rgba(255,255,255,.4)",cursor:"pointer",transition:"width .2s"}}/>)}
          </div>
        </>}
      </div>
      <div style={{background:"rgba(255,255,255,.06)",padding:"4px 12px",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:"rgba(255,255,255,.5)"}}>{cur+1}/{slides.length}</span><span style={{fontSize:10,color:"rgba(255,255,255,.3)"}}>Carrusel</span></div>
    </div>
  );
  if(emb)return(<div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e0e0e0"}}><div style={{background:"#f0f0f0",padding:"6px 11px",fontSize:10,color:"#666",display:"flex",alignItems:"center",gap:5}}>\uD83C\uDFA0 Carpeta de Drive <a href={folderUrl} target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",marginLeft:"auto"}}>Abrir \u2197</a></div><iframe src={emb} width="100%" height="190" frameBorder="0" style={{display:"block"}}/></div>);
  return null;
}

// ── DRV FIELD ─────────────────────────────────────────────────────────────────
function DrvField({label,value,onChange,ph,hint,isCarousel=false}){
  const drive=isDrive(value),folder=isFolder(value);
  const color=drive?(folder&&isCarousel?"#0984e3":"#34a853"):"#e0e0e0";
  return(<div style={{marginBottom:9}}>
    {label&&<div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:4}}>{label}</div>}
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={ph||"Peg\u00E1 el link..."} style={{width:"100%",padding:"8px 11px",borderRadius:8,border:"1.5px solid "+color,fontSize:12,outline:"none",background:"#fff"}}/>
    {drive&&folder&&isCarousel&&<div style={{fontSize:9,color:"#0984e3",marginTop:2}}>\uD83D\uDCC1 Carpeta de Drive detectada</div>}
    {drive&&!folder&&<div style={{fontSize:9,color:"#34a853",marginTop:2}}>\u2713 Archivo de Drive detectado</div>}
    {hint&&<div style={{fontSize:9,color:"#aaa",marginTop:2}}>{hint}</div>}
  </div>);
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({clients,onLogin}){
  const[user,setUser]=useState(""),[pass,setPass]=useState(""),[err,setErr]=useState(""),[show,setShow]=useState(false);
  const[guestClient,setGuestClient]=useState(null),[guestPass,setGuestPass]=useState(""),[guestErr,setGuestErr]=useState(""),[showGP,setShowGP]=useState(false);

  function doLogin(){
    const c=clients.find(c=>c.username===user.trim()&&c.password===pass);
    if(c){setErr("");onLogin(c.id,"editor");}else setErr("Usuario o contrase\u00F1a incorrectos");
  }
  function doGuestLogin(c){
    if(!c.guestPassword){onLogin(c.id,"guest");return;}
    setGuestClient(c);setGuestPass("");setGuestErr("");
  }
  function confirmGuest(){
    if(guestPass===guestClient.guestPassword){onLogin(guestClient.id,"guest");}
    else setGuestErr("Contrase\u00F1a incorrecta");
  }

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:24,padding:"36px 32px",width:"min(400px,96vw)",boxShadow:"0 32px 80px rgba(0,0,0,.4)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:32,marginBottom:7}}>\uD83D\uDCC5</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,marginBottom:4}}>Planificador RRSS</div>
          <div style={{fontSize:11,color:"#aaa"}}>Planning Indie Agency</div>
        </div>

        {/* Editor login */}
        <div style={{marginBottom:11}}>
          <div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:4}}>Usuario</div>
          <input value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="tu_usuario" style={{width:"100%",padding:"10px 13px",borderRadius:9,border:"1.5px solid #e0e0e0",fontSize:13,outline:"none"}}/>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:4}}>Contrase\u00F1a</div>
          <div style={{position:"relative"}}>
            <input value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} type={show?"text":"password"} placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" style={{width:"100%",padding:"10px 38px 10px 13px",borderRadius:9,border:"1.5px solid "+(err?"#e53935":"#e0e0e0"),fontSize:13,outline:"none"}}/>
            <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#aaa"}}>{show?"\uD83D\uDE48":"\uD83D\uDC41\uFE0F"}</button>
          </div>
        </div>
        {err&&<div style={{background:"#fff3f3",border:"1px solid #ffcdd2",borderRadius:7,padding:"7px 11px",fontSize:11,color:"#e53935",marginBottom:12}}>{err}</div>}
        <button onClick={doLogin} style={{width:"100%",padding:"12px",borderRadius:11,border:"none",background:"#1a1a1a",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:16}}>Ingresar \u2192</button>

        {/* Guest section */}
        <div style={{borderTop:"1px solid #f0f0f0",paddingTop:14}}>
          <div style={{fontSize:10,color:"#aaa",textAlign:"center",marginBottom:9}}>\uD83D\uDC64 Acceso como invitado (solo lectura)</div>
          {guestClient?(
            <div style={{background:"#f8f8f8",borderRadius:11,padding:14,border:"1.5px solid #e8e8e8"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:11}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:guestClient.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12}}>{guestClient.name.charAt(0).toUpperCase()}</div>
                <div style={{fontSize:12,fontWeight:600}}>{guestClient.name}</div>
                <button onClick={()=>setGuestClient(null)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:16}}>\u00D7</button>
              </div>
              <div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:5}}>Contrase\u00F1a de invitado</div>
              <div style={{display:"flex",gap:7}}>
                <div style={{position:"relative",flex:1}}>
                  <input value={guestPass} onChange={e=>setGuestPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&confirmGuest()} type={showGP?"text":"password"} placeholder="\u2022\u2022\u2022\u2022\u2022\u2022" style={{width:"100%",padding:"9px 34px 9px 11px",borderRadius:8,border:"1.5px solid "+(guestErr?"#e53935":"#e0e0e0"),fontSize:12,outline:"none"}}/>
                  <button onClick={()=>setShowGP(s=>!s)} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#aaa"}}>{showGP?"\uD83D\uDE48":"\uD83D\uDC41\uFE0F"}</button>
                </div>
                <button onClick={confirmGuest} style={{padding:"9px 14px",borderRadius:8,border:"none",background:"#1a1a1a",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>Entrar</button>
              </div>
              {guestErr&&<div style={{fontSize:10,color:"#e53935",marginTop:5}}>{guestErr}</div>}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {clients.map(c=>(
                <button key={c.id} onClick={()=>doGuestLogin(c)}

                  {c.name}

                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
function AdminPanel({dbArg,onSave,onClose}){

                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:12}}>{c.name}</div><div style={{fontSize:9,color:"#aaa"}}>@{c.username} &middot; {c.posts?.length||0} posts &middot; {c.guestPassword?"\uD83D\uDD12 invitado protegido":"invitado libre"}</div></div>
                <button onClick={()=>setEditing(editing===c.id?null:c.id)} style={{padding:"3px 10px",borderRadius:6,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:10}}>{editing===c.id?"Cerrar":"\u270F Editar"}</button>
                {c.id!=="admin"&&<button onClick={()=>delClient(c.id)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #ffcdd2",background:"#fff3f3",cursor:"pointer",fontSize:10,color:"#e53935"}}>\uD83D\uDDD1</button>}
              </div>
              {editing===c.id&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,paddingTop:9,borderTop:"1px solid #e8e8e8",marginTop:9}}>
                  {fields.map(({f,l})=>(
                    <div key={f}><div style={{fontSize:9,fontWeight:600,color:"#888",marginBottom:2}}>{l}</div><input value={c[f]||""} onChange={e=>upd(c.id,f,e.target.value)} style={{width:"100%",padding:"6px 9px",borderRadius:6,border:"1.5px solid #e0e0e0",fontSize:11,outline:"none"}}/></div>
                  ))}
                  <div><div style={{fontSize:9,fontWeight:600,color:"#888",marginBottom:2}}>Color</div><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{COLORS.map(col=><div key={col} onClick={()=>upd(c.id,"color",col)} style={{width:17,height:17,borderRadius:"50%",background:col,cursor:"pointer",border:c.color===col?"3px solid #1a1a1a":"2px solid transparent"}}/>)}</div></div>
                </div>
              )}
            </div>
          ))}
        </div>
        <div style={{padding:"12px 22px",borderTop:"1.5px solid #f0f0f0",display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"9px",borderRadius:9,border:"1.5px solid #e0e0e0",background:"#fafafa",cursor:"pointer",fontWeight:600,fontSize:12}}>Cancelar</button>
          <button onClick={()=>onSave({...dbArg,clients})} style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>Guardar cambios</button>
        </div>
      </div>
    </div>
  );
}

// ── SCRIPT MODAL (Guion) ──────────────────────────────────────────────────────
function ScriptModal({script,onSave,onClose,isGuest,onSaveNote,linkedPost}){
  const isNew=!script.id;
  const[form,setForm]=useState(script);
  const[notes,setNotes]=useState(script.notes||[]);
  const[newNote,setNewNote]=useState("");
  const[guestName]=useState(()=>localStorage.getItem("rrss_guest_name")||"Invitado");
  const inp={width:"100%",padding:"8px 11px",borderRadius:8,border:"1.5px solid #e0e0e0",fontSize:12,outline:"none",boxSizing:"border-box"};

  function addScene(){setForm(f=>({...f,scenes:[...f.scenes,{audio:"",video:""}]}));}
  function updScene(i,field,v){const s=[...form.scenes];s[i]={...s[i],[field]:v};setForm(f=>({...f,scenes:s}));}
  function removeScene(i){if(form.scenes.length<=1)return;const s=form.scenes.filter((_,idx)=>idx!==i);setForm(f=>({...f,scenes:s}));}
  function addNote(){
    if(!newNote.trim())return;
    const n={id:Date.now(),text:newNote.trim(),author:guestName,date:new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})};
    const updated=[...notes,n];setNotes(updated);setNewNote("");
    if(onSaveNote)onSaveNote(script.id,updated);
  }

  const apSt=APROV_ST[form.approvalStatus]||APROV_ST.pendiente;

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{width:"min(820px,98vw)",maxHeight:"94vh"}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:"14px 20px",borderBottom:"1.5px solid #f0f0f0",display:"flex",alignItems:"center",gap:10,background:"#fafafa",borderRadius:"18px 18px 0 0"}}>
          <button onClick={onClose} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>\u2190</button>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700}}>{isNew?"Nuevo gui\u00F3n":form.title||"Gui\u00F3n sin t\u00EDtulo"}</div>
            {linkedPost&&<div style={{fontSize:10,color:"#aaa",marginTop:1}}>\uD83D\uDCC5 Vinculado a: {linkedPost.title}</div>}
          </div>
          <div style={{padding:"4px 10px",borderRadius:20,background:apSt.c,fontSize:10,fontWeight:700,color:apSt.t}}>{apSt.l}</div>
        </div>

        <div style={{overflow:"auto",flex:1}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,minHeight:0}}>
            {/* LEFT: form */}
            <div style={{padding:"18px 20px",borderRight:"1.5px solid #f0f0f0",overflowY:"auto"}}>
              {!isGuest&&(
                <>
                  <input placeholder="T\u00EDtulo del gui\u00F3n *" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={{...inp,marginBottom:9,fontSize:14,fontWeight:600}}/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:9}}>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:4}}>Tipo de contenido</div>
                      <select value={form.ctype} onChange={e=>setForm(f=>({...f,ctype:e.target.value}))} style={{...inp,padding:"7px 10px"}}>
                        {["reel","carrusel","posteo","historia","video"].map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
                      </select>
                    </div>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:4}}>Objetivo</div>
                      <select value={form.objective} onChange={e=>setForm(f=>({...f,objective:e.target.value}))} style={{...inp,padding:"7px 10px"}}>
                        {SCRIPT_OBJ.map(o=><option key={o} value={o}>{o.charAt(0).toUpperCase()+o.slice(1)}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{marginBottom:9}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:4}}>\uD83D\uDCC5 Fecha estimada de publicaci\u00F3n</div>
                    <input type="date" value={form.date||""} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp}/>
                  </div>
                  <div style={{marginBottom:9}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:4}}>\uD83D\uDD17 Referencias (links)</div>
                    <textarea value={form.refs} onChange={e=>setForm(f=>({...f,refs:e.target.value}))} placeholder="https://tiktok.com/..." rows={2} style={{...inp,resize:"vertical"}}/>
                  </div>
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:4}}>\uD83C\uDFAC Necesidades de producci\u00F3n</div>
                    <textarea value={form.needs} onChange={e=>setForm(f=>({...f,needs:e.target.value}))} placeholder="Actores, props, locaci\u00F3n, vestuario..." rows={2} style={{...inp,resize:"vertical"}}/>
                  </div>

                  {/* Tabla Audio/Video */}
                  <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:8,textTransform:"uppercase",letterSpacing:.4}}>Tabla Audio / Video</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,borderRadius:10,overflow:"hidden",border:"1.5px solid #e8e8e8",marginBottom:8}}>
                    <div style={{background:"#1a1a1a",color:"#fff",padding:"7px 10px",fontSize:10,fontWeight:700}}>AUDIO</div>
                    <div style={{background:"#1a1a1a",color:"#fff",padding:"7px 10px",fontSize:10,fontWeight:700,borderLeft:"1px solid #333"}}>VIDEO</div>
                    {form.scenes.map((sc,i)=>(
                      <React.Fragment key={i}>
                        <div style={{padding:"6px 8px",borderTop:"1px solid #e8e8e8",position:"relative"}}>
                          <div style={{fontSize:9,color:"#bbb",marginBottom:3}}>Escena {i+1}</div>
                          <textarea value={sc.audio} onChange={e=>updScene(i,"audio",e.target.value)} placeholder="Voz, m\u00FAsica, efecto..." rows={2} style={{width:"100%",padding:"5px 7px",borderRadius:6,border:"1px solid #e8e8e8",fontSize:11,resize:"vertical",outline:"none",fontFamily:"inherit"}}/>
                        </div>
                        <div style={{padding:"6px 8px",borderTop:"1px solid #e8e8e8",borderLeft:"1px solid #e8e8e8",position:"relative"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:9,color:"#bbb"}}>Escena {i+1}</span>
                            {form.scenes.length>1&&<button onClick={()=>removeScene(i)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#ddd",padding:0}}>\u00D7</button>}
                          </div>
                          <textarea value={sc.video} onChange={e=>updScene(i,"video",e.target.value)} placeholder="Plano, acci\u00F3n, texto en pantalla..." rows={2} style={{width:"100%",padding:"5px 7px",borderRadius:6,border:"1px solid #e8e8e8",fontSize:11,resize:"vertical",outline:"none",fontFamily:"inherit"}}/>
                        </div>
                      </React.Fragment>
                    ))}
                  </div>
                  <button onClick={addScene} style={{fontSize:10,padding:"5px 12px",borderRadius:7,border:"1px dashed #ccc",background:"#fff",cursor:"pointer",color:"#888",marginBottom:14}}>+ Agregar escena</button>

                  {/* Estado aprobacion */}
                  <div style={{marginBottom:16}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:7,textTransform:"uppercase",letterSpacing:.4}}>Estado de aprobaci\u00F3n</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {Object.entries(APROV_ST).map(([k,v])=>(
                        <button key={k} onClick={()=>setForm(f=>({...f,approvalStatus:k}))}
                          style={{padding:"5px 12px",borderRadius:20,border:"1.5px solid "+(form.approvalStatus===k?"#1a1a1a":"#e0e0e0"),background:form.approvalStatus===k?v.c:"#fafafa",fontWeight:form.approvalStatus===k?700:400,fontSize:11,cursor:"pointer",color:form.approvalStatus===k?v.t:"#888"}}>
                          {v.l}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div style={{display:"flex",gap:8}}>
                    <button onClick={onClose} style={{flex:1,padding:"9px",borderRadius:9,border:"1.5px solid #e0e0e0",background:"#fafafa",cursor:"pointer",fontWeight:600,fontSize:12}}>Cancelar</button>
                    <button onClick={()=>onSave(form)} disabled={!form.title.trim()} style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:form.title.trim()?"#1a1a1a":"#ccc",color:"#fff",cursor:form.title.trim()?"pointer":"default",fontWeight:700,fontSize:12}}>{isNew?"Crear gui\u00F3n":"Guardar cambios"}</button>
                  </div>
                </>
              )}

              {/* Vista lectura para invitado */}
              {isGuest&&(
                <div>
                  <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
                    <span style={{padding:"4px 10px",borderRadius:20,background:"#f0f0f0",fontSize:11,color:"#666"}}>{form.ctype}</span>
                    <span style={{padding:"4px 10px",borderRadius:20,background:"#e3f2fd",fontSize:11,color:"#0A66C2"}}>{form.objective}</span>
                    {form.date&&<span style={{padding:"4px 10px",borderRadius:20,background:"#f0f0f0",fontSize:11,color:"#888"}}>\uD83D\uDCC5 {form.date}</span>}
                  </div>
                  {form.refs&&<div style={{background:"#f7f7f7",borderRadius:9,padding:"9px 11px",marginBottom:10,fontSize:11}}><strong>\uD83D\uDD17 Referencias:</strong><br/>{form.refs.split("\n").map((r,i)=>r.trim()&&<a key={i} href={r.trim()} target="_blank" rel="noopener noreferrer" style={{display:"block",color:"#0A66C2",wordBreak:"break-all",marginTop:3}}>{r.trim()}</a>)}</div>}
                  {form.needs&&<div style={{background:"#fff8e1",borderRadius:9,padding:"9px 11px",marginBottom:12,fontSize:11}}><strong>\uD83C\uDFAC Necesidades:</strong><br/><div style={{marginTop:4,color:"#555"}}>{form.needs}</div></div>}
                  <div style={{fontSize:10,fontWeight:700,color:"#555",marginBottom:8,textTransform:"uppercase",letterSpacing:.4}}>Tabla Audio / Video</div>
                  <div style={{border:"1.5px solid #e8e8e8",borderRadius:10,overflow:"hidden",marginBottom:4}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
                      <div style={{background:"#1a1a1a",color:"#fff",padding:"6px 10px",fontSize:10,fontWeight:700}}>AUDIO</div>
                      <div style={{background:"#1a1a1a",color:"#fff",padding:"6px 10px",fontSize:10,fontWeight:700,borderLeft:"1px solid #333"}}>VIDEO</div>
                      {form.scenes.map((sc,i)=>(
                        <React.Fragment key={i}>
                          <div style={{padding:"8px 10px",borderTop:"1px solid #e8e8e8",fontSize:11,color:"#333",lineHeight:1.4}}>{sc.audio||<span style={{color:"#ccc"}}>—</span>}</div>
                          <div style={{padding:"8px 10px",borderTop:"1px solid #e8e8e8",borderLeft:"1px solid #e8e8e8",fontSize:11,color:"#333",lineHeight:1.4}}>{sc.video||<span style={{color:"#ccc"}}>—</span>}</div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* RIGHT: notas */}
            <div style={{padding:"18px 20px",display:"flex",flexDirection:"column",gap:0}}>
              <div style={{fontWeight:700,fontSize:12,color:"#444",marginBottom:10}}>\uD83D\uDCAC Comentarios ({notes.length})</div>
              <div style={{flex:1,overflowY:"auto",maxHeight:340,marginBottom:10}}>
                {notes.length===0&&<div style={{textAlign:"center",padding:"20px 0",fontSize:11,color:"#ccc"}}>Sin comentarios todav\u00EDa</div>}
                {notes.map(n=>(
                  <div key={n.id} style={{background:"#fafafa",borderRadius:9,padding:"9px 11px",marginBottom:7,border:"1.5px solid #f0f0f0"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:"#e0e0e0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#666"}}>{n.author.charAt(0).toUpperCase()}</div>
                      <span style={{fontSize:11,fontWeight:700,color:"#444"}}>{n.author}</span>
                      <span style={{fontSize:9,color:"#bbb",marginLeft:"auto"}}>{n.date}</span>
                      {!isGuest&&<button onClick={()=>{const u=notes.filter(x=>x.id!==n.id);setNotes(u);if(onSaveNote)onSaveNote(script.id,u);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#ddd",padding:"0 2px"}}>\u00D7</button>}
                    </div>
                    <div style={{fontSize:11,color:"#333",lineHeight:1.5}}>{n.text}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:7,alignItems:"flex-end"}}>
                <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder={isGuest?"Dej\u00E1 tu comentario...":"Nota interna..."} rows={2}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addNote();}}}
                  style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1.5px solid #e0e0e0",fontSize:11,resize:"none",outline:"none",fontFamily:"inherit"}}/>
                <button onClick={addNote} disabled={!newNote.trim()} style={{padding:"8px 12px",borderRadius:8,border:"none",background:newNote.trim()?"#1a1a1a":"#e0e0e0",color:newNote.trim()?"#fff":"#aaa",fontWeight:700,fontSize:11,cursor:newNote.trim()?"pointer":"default",flexShrink:0}}>Enviar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── SCRIPTS VIEW ──────────────────────────────────────────────────────────────
function ScriptsView({scripts,posts,isGuest,onOpen,onNew,onDelete}){
  const[filter,setFilter]=useState("all");
  const filtered=filter==="all"?scripts:scripts.filter(s=>s.approvalStatus===filter);
  return(
    <div style={{padding:"20px 22px 40px",maxWidth:900,margin:"0 auto"}} className="fade">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700}}>Gui\u00F3n de contenidos</div><div style={{fontSize:11,color:"#999",marginTop:2}}>Proceso previo al calendario</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:5,background:"#f0f0f0",borderRadius:20,padding:"3px"}}>
            {[["all","Todos"],["pendiente","Pendiente"],["aprobado","Aprobado"],["cambios","Con cambios"]].map(([k,l])=>(
              <button key={k} onClick={()=>setFilter(k)} style={{padding:"4px 10px",borderRadius:17,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,background:filter===k?"#fff":"transparent",color:filter===k?"#1a1a1a":"#888"}}>{l}</button>
            ))}
          </div>
          {!isGuest&&<button onClick={onNew} style={{padding:"7px 14px",borderRadius:9,border:"none",background:"#1a1a1a",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Nuevo gui\u00F3n</button>}
        </div>
      </div>

      {filtered.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#ccc"}}>
          <div style={{fontSize:40,marginBottom:10}}>\uD83D\uDCDD</div>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Sin gui\u00F3nes todav\u00EDa</div>
          {!isGuest&&<div style={{fontSize:12}}>Cre\u00E1 el primer gui\u00F3n para empezar el proceso</div>}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
        {filtered.map(s=>{
          const apSt=APROV_ST[s.approvalStatus]||APROV_ST.pendiente;
          const linked=posts.find(p=>p.linkedScriptId===s.id);
          return(
            <div key={s.id} onClick={()=>onOpen(s)}
              style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1.5px solid #ebebeb",cursor:"pointer",transition:"box-shadow .15s,transform .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,.1)";e.currentTarget.style.transform="translateY(-2px)";}}
              onMouseLeave={e=>{e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="none";}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:3,lineHeight:1.2}}>{s.title||"Sin t\u00EDtulo"}</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    <span style={{padding:"2px 7px",borderRadius:20,background:"#f0f0f0",fontSize:9,color:"#666"}}>{s.ctype}</span>
                    <span style={{padding:"2px 7px",borderRadius:20,background:"#e3f2fd",fontSize:9,color:"#0A66C2"}}>{s.objective}</span>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                  <span style={{padding:"3px 8px",borderRadius:20,background:apSt.c,fontSize:9,fontWeight:700,color:apSt.t,whiteSpace:"nowrap"}}>{apSt.l}</span>
                  {!isGuest&&<button onClick={e=>{e.stopPropagation();onDelete(s.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#e0e0e0",padding:0}} title="Eliminar">\uD83D\uDDD1</button>}
                </div>
              </div>
              {s.date&&<div style={{fontSize:10,color:"#aaa",marginBottom:6}}>\uD83D\uDCC5 {s.date}</div>}
              {s.scenes&&s.scenes.length>0&&(
                <div style={{background:"#f8f8f8",borderRadius:8,padding:"6px 9px",fontSize:10,color:"#666",marginBottom:6}}>
                  {s.scenes.length} escena{s.scenes.length!==1?"s":""} &middot; {s.scenes.filter(sc=>sc.audio||sc.video).length} con contenido
                </div>
              )}
              {linked&&<div style={{fontSize:10,color:"#4caf50",display:"flex",alignItems:"center",gap:4}}>\uD83D\uDCC5 Vinculado al calendario</div>}
              {(s.notes||[]).length>0&&<div style={{fontSize:10,color:"#888",marginTop:4}}>\uD83D\uDCAC {s.notes.length} comentario{s.notes.length!==1?"s":""}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── FEED TILE ─────────────────────────────────────────────────────────────────
function Tile({post,idx,onSelect,isDrag,isDragOver,onDragStart,onDragEnter,onDragEnd}){
  const[hov,setHov]=useState(false),[err,setErr]=useState(false);
  const pl=PLAT[post.platform],ct=CT.find(c=>c.v===post.ctype),raw=post.coverDriveUrl||post.driveUrl,src=resolve(raw);
  return(
    <div draggable onDragStart={()=>onDragStart(idx)} onDragEnter={()=>onDragEnter(idx)} onDragEnd={onDragEnd}
      onClick={()=>onSelect(post)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{position:"relative",aspectRatio:"1/1",borderRadius:2,overflow:"hidden",cursor:"pointer",background:"#f0f0f0",outline:isDragOver?"3px dashed #1a1a1a":"none",opacity:isDrag?0.4:1,transition:"opacity .15s"}}>
      {raw&&!err?<img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={()=>setErr(true)} crossOrigin="anonymous"/>:<div style={{width:"100%",height:"100%",background:"linear-gradient(135deg,"+pl.bg+",#fff)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:28,opacity:.25}}>{ct?.i||pl.icon}</span></div>}
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.62)",opacity:hov?1:0,transition:"opacity .2s",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:8}}>
        <div style={{color:"#fff",fontWeight:700,fontSize:11,textAlign:"center",lineHeight:1.3}}>{post.title}</div>
        <div style={{color:"rgba(255,255,255,.65)",fontSize:9}}>{post.date}</div>

// ── FEED VIEW ─────────────────────────────────────────────────────────────────
function FeedView({posts,acc,onSelect}){
  const[plat,setPlat]=useState("instagram"),[manual,setManual]=useState([]),[isMan,setIsMan]=useState(false),[dIdx,setDIdx]=useState(null),[dOver,setDOver]=useState(null);
  const pl=PLAT[plat],filtered=posts.filter(p=>p.platform===plat).sort((a,b)=>new Date(b.date)-new Date(a.date));
  useEffect(()=>{setManual(filtered.map(p=>p.id));setIsMan(false);},[plat,posts.length]);
  const ordered=isMan?manual.map(id=>filtered.find(p=>p.id===id)).filter(Boolean):filtered;
  function dragEnd(){if(dIdx!==null&&dOver!==null&&dIdx!==dOver){const arr=[...(isMan?manual:filtered.map(p=>p.id))];const[m]=arr.splice(dIdx,1);arr.splice(dOver,0,m);setManual(arr);setIsMan(true);}setDIdx(null);setDOver(null);}
  const handle=acc[plat],profUrl=handle?pl.url+handle:null;
  return(
    <div style={{padding:"18px 22px 40px",maxWidth:640,margin:"0 auto"}} className="fade">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700}}>Vista de Feed</div><div style={{fontSize:10,color:"#999",marginTop:1}}>Arrastr\u00E1 para reordenar</div></div>
        <div style={{display:"flex",gap:7}}>{Object.entries(PLAT).map(([k,p])=><button key={k} onClick={()=>setPlat(k)} style={{padding:"5px 12px",borderRadius:20,border:"2px solid "+(plat===k?p.color:"#e0e0e0"),background:plat===k?p.bg:"#fff",color:plat===k?p.color:"#888",fontWeight:700,fontSize:11,cursor:"pointer"}}>{p.icon} {p.label}</button>)}</div>
      </div>
      <div style={{background:"#fff",borderRadius:16,border:"1.5px solid #ebebeb",overflow:"hidden",boxShadow:"0 4px 18px rgba(0,0,0,.06)"}}>
        <div style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:12,borderBottom:"1px solid #f0f0f0"}}>
          <div style={{width:50,height:50,borderRadius:"50%",background:pl.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,boxShadow:"0 0 0 3px rgba(0,0,0,.07)"}}>{pl.icon}</div>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{handle?"@"+handle:"tu_cuenta"}</div><div style={{fontSize:10,color:"#888"}}><strong style={{color:"#1a1a1a"}}>{ordered.length}</strong> posts</div></div>
          {profUrl?<a href={profUrl} target="_blank" rel="noopener noreferrer" style={{background:pl.grad,color:"#fff",borderRadius:8,padding:"6px 13px",fontSize:11,fontWeight:700,textDecoration:"none",flexShrink:0}}>Ver perfil \u2197</a>:<div style={{borderRadius:8,padding:"6px 13px",fontSize:10,fontWeight:600,color:"#ccc",border:"1px solid #eee",flexShrink:0}}>Vincular cuenta</div>}
        </div>
        {ordered.length===0?<div style={{padding:48,textAlign:"center",color:"#ccc"}}><div style={{fontSize:36,marginBottom:8}}>\uD83D\uDDBC\uFE0F</div><div style={{fontSize:12,fontWeight:600,marginBottom:3}}>Sin publicaciones</div><div style={{fontSize:10}}>Agrega posts con portada para {pl.label}</div></div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:3,padding:3}}>
          {ordered.map((p,i)=><Tile key={p.id} post={p} idx={i} onSelect={onSelect} isDrag={dIdx===i} isDragOver={dOver===i} onDragStart={i=>setDIdx(i)} onDragEnter={i=>setDOver(i)} onDragEnd={dragEnd}/>)}
          {Array.from({length:(3-(ordered.length%3))%3}).map((_,i)=><div key={"ph"+i} style={{aspectRatio:"1/1",background:"#fafafa",border:"2px dashed #ebebeb",borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:12,opacity:.15}}>+</span></div>)}
        </div>}
      </div>
      {ordered.length>0&&<div style={{display:"flex",gap:6,alignItems:"center",marginTop:8,flexWrap:"wrap"}}>
        <div style={{fontSize:10,color:"#aaa",flex:1}}>{isMan?"\uD83D\uDDA5\uFE0F Orden manual":"\uD83D\uDCC5 Por fecha"}</div>
        {isMan&&<button onClick={()=>{setIsMan(false);setManual(filtered.map(p=>p.id));}} style={{fontSize:10,padding:"3px 9px",borderRadius:20,border:"1px solid #ddd",background:"#fafafa",cursor:"pointer",color:"#666"}}>Restablecer</button>}
        {ST_OPT.map(s=>{const c=ordered.filter(p=>p.status===s).length;return c>0?<div key={s} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:"#666",background:"#fff",borderRadius:20,padding:"3px 7px",border:"1px solid #ebebeb"}}><span style={{width:6,height:6,borderRadius:2,background:ST_CLR[s],display:"inline-block"}}/>{s} ({c})</div>:null;})}
      </div>}
    </div>
  );
}

            {post.coverDriveUrl&&<div><strong>\uD83C\uDFA5</strong> <a href={post.coverDriveUrl} target="_blank" rel="noopener noreferrer" style={{color:"#0A66C2",wordBreak:"break-all"}}>{post.coverDriveUrl.slice(0,50)}\u2026</a></div>}
          </div>}
          {linkedScript&&<div onClick={()=>onOpenScript(linkedScript)} style={{background:"#f0f7ff",borderRadius:9,padding:"7px 11px",marginBottom:8,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:7,border:"1px solid #c8e0ff"}}><span style={{fontSize:14}}>\uD83D\uDCDD</span><div><div style={{fontWeight:700,fontSize:11}}>Gui\u00F3n vinculado</div><div style={{fontSize:10,color:"#666"}}>{linkedScript.title}</div></div><span style={{marginLeft:"auto",fontSize:10,color:"#0A66C2"}}>Ver \u2192</span></div>}
          {post.caption&&<div style={{fontSize:11,color:"#333",lineHeight:1.5,background:"#fafafa",borderRadius:7,padding:"7px 10px",marginBottom:5}}>{post.caption}</div>}
          {post.hashtags&&<div style={{fontSize:10,color:"#0A66C2",marginBottom:10}}>{post.hashtags}</div>}

          {/* Notas */}
          <div style={{borderTop:"1.5px solid #f0f0f0",paddingTop:12,marginTop:4}}>
            <div style={{fontWeight:700,fontSize:11,color:"#444",marginBottom:9}}>\uD83D\uDCAC Comentarios ({notes.length})</div>
            {notes.length===0&&<div style={{textAlign:"center",padding:"10px 0",fontSize:11,color:"#ccc",marginBottom:8}}>Sin comentarios todav\u00EDa</div>}
            {notes.map(n=>(
              <div key={n.id} style={{background:"#fafafa",borderRadius:8,padding:"8px 10px",marginBottom:6,border:"1.5px solid #f0f0f0"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:"#e0e0e0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#666"}}>{n.author.charAt(0).toUpperCase()}</div>
                  <span style={{fontSize:10,fontWeight:700,color:"#444"}}>{n.author}</span>
                  <span style={{fontSize:8,color:"#bbb",marginLeft:"auto"}}>{n.date}</span>
                  {!isGuest&&<button onClick={()=>{const u=notes.filter(x=>x.id!==n.id);setNotes(u);onSaveNote(post.id,u);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#ddd",padding:"0 2px"}}>\u00D7</button>}
                </div>
                <div style={{fontSize:11,color:"#333",lineHeight:1.4}}>{n.text}</div>
              </div>
            ))}
            <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
              <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder={isGuest?"Dej\u00E1 tu comentario...":"Nota interna..."} rows={2}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addNote();}}}
                style={{flex:1,padding:"7px 9px",borderRadius:7,border:"1.5px solid #e0e0e0",fontSize:11,resize:"none",outline:"none",fontFamily:"inherit"}}/>
              <button onClick={addNote} disabled={!newNote.trim()} style={{padding:"7px 11px",borderRadius:7,border:"none",background:newNote.trim()?"#1a1a1a":"#e0e0e0",color:newNote.trim()?"#fff":"#aaa",fontWeight:700,fontSize:11,cursor:newNote.trim()?"pointer":"default",flexShrink:0}}>Enviar</button>
            </div>
          </div>

          {!isGuest&&<div style={{display:"flex",gap:7,marginTop:12}}>
            <button onClick={()=>onDelete(post.id)} style={{flex:1,padding:"8px",borderRadius:9,border:"1.5px solid #ffcdd2",background:"#fff3f3",color:"#e53935",cursor:"pointer",fontWeight:600,fontSize:11}}>\uD83D\uDDD1\uFE0F Eliminar</button>
            <button onClick={()=>onEdit(post)} style={{flex:2,padding:"8px",borderRadius:9,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:11}}>\u270F\uFE0F Editar</button>
          </div>}
        </div>
      </div>
    </div>
  );
}

// ── ACC SETTINGS ──────────────────────────────────────────────────────────────
function AccSettings({acc,onSave,onClose}){
  const[ig,setIg]=useState(acc.instagram||""),[li,setLi]=useState(acc.linkedin||"");
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div style={{background:"#fff",borderRadius:18,width:"min(360px,96vw)",padding:24,boxShadow:"0 24px 60px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18}}>
          <button onClick={onClose} style={{background:"none",border:"1px solid #e0e0e0",borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>\u2190</button>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700}}>Cuentas de redes</div>
        </div>
        {[{k:"instagram",icon:"\uD83D\uDCF8",color:"#E1306C",val:ig,set:setIg,base:"instagram.com/"},{k:"linkedin",icon:"\uD83D\uDCBC",color:"#0A66C2",val:li,set:setLi,base:"linkedin.com/in/"}].map(p=>(
          <div key={p.k} style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:"#444",marginBottom:4}}>{p.icon} {p.k.charAt(0).toUpperCase()+p.k.slice(1)}</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:11,color:"#aaa",fontWeight:600}}>@</span><input value={p.val} onChange={e=>p.set(e.target.value)} placeholder="tu_usuario" style={{flex:1,padding:"8px 10px",borderRadius:7,border:"1.5px solid #e0e0e0",fontSize:12,outline:"none"}}/></div>
            {p.val&&<div style={{fontSize:9,color:p.color,marginTop:2}}>\u2192 {p.base}{p.val.replace(/^@/,"")}</div>}
          </div>
        ))}
        <div style={{display:"flex",gap:7,marginTop:14}}>
          <button onClick={onClose} style={{flex:1,padding:"9px",borderRadius:9,border:"1.5px solid #e0e0e0",background:"#fafafa",cursor:"pointer",fontWeight:600,fontSize:12}}>Cancelar</button>
          <button onClick={()=>onSave({instagram:ig.replace(/^@/,"").trim(),linkedin:li.replace(/^@/,"").trim()})} style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:12}}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[dbData,setDbRaw]=useState(null);
  const[session,setSession]=useState(null);
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({...EMPTY_POST});
  const[detail,setDetail]=useState(null);
  const[scriptDetail,setScriptDetail]=useState(null);
  const[filterP,setFilterP]=useState("all");
  const[view,setView]=useState("calendario");
  const[showAcc,setShowAcc]=useState(false);
  const[showAdmin,setShowAdmin]=useState(false);
  const[saving,setSaving]=useState(false);
  const today=new Date();
  const[year,setYear]=useState(today.getFullYear());
  const[month,setMonth]=useState(today.getMonth());

  useEffect(()=>{
    const unsub=db.collection("planificador").doc("main").onSnapshot(doc=>{
      if(doc.exists){setDbRaw(doc.data().db);}
      else{const def=defaultDB();setDbRaw(def);saveDBToFirebase(def);}
    },err=>{console.error(err);setDbRaw(defaultDB());});
    return()=>unsub();
  },[]);

  async function setDb(v){setDbRaw(v);setSaving(true);await saveDBToFirebase(v);setSaving(false);}
  function updClient(id,fn){setDb({...dbData,clients:dbData.clients.map(c=>c.id===id?fn(c):c)});}

  if(!dbData)return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a1a,#2d2d2d)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
      <div style={{fontSize:34}}>\uD83D\uDCC5</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700,color:"#fff"}}>Planificador RRSS</div>
      <div style={{fontSize:12,color:"#888"}}>Conectando con la base de datos...</div>
      <div style={{width:36,height:36,borderRadius:"50%",border:"3px solid #333",borderTop:"3px solid #fff",animation:"spin 1s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  const client=dbData.clients.find(c=>c.id===session?.id);
  const isGuest=session?.role==="guest";
  if(!session)return<LoginScreen clients={dbData.clients} onLogin={(id,role)=>setSession({id,role})}/>;
  if(!client){setSession(null);return null;}

  const posts=client.posts||[];
  const scripts=client.scripts||[];
  const acc=client.accounts||{instagram:"",linkedin:""};
  const dim=daysIn(year,month),fd=firstOf(year,month);
  const pfDay=day=>{const ds=year+"-"+String(month+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");return posts.filter(p=>p.date===ds&&(filterP==="all"||p.platform===filterP));};
  const openAdd=day=>{if(isGuest)return;setForm({...EMPTY_POST});setModal({day});};
  const openEdit=post=>{if(isGuest)return;setDetail(null);setForm({platform:post.platform,title:post.title,caption:post.caption,status:post.status,hashtags:post.hashtags||"",ctype:post.ctype||"image",driveUrl:post.driveUrl||"",coverDriveUrl:post.coverDriveUrl||"",folderUrl:post.folderUrl||"",carouselImages:post.carouselImages||[],customDate:post.date||"",linkedScriptId:post.linkedScriptId||null});setModal({day:parseInt(post.date.split("-")[2]),editId:post.id});};
  const save=()=>{if(!form.title.trim())return;const ds=form.customDate||year+"-"+String(month+1).padStart(2,"0")+"-"+String(modal.day).padStart(2,"0");updClient(client.id,c=>({...c,posts:modal.editId?c.posts.map(p=>p.id===modal.editId?{...p,...form,date:ds}:p):[...(c.posts||[]),{...form,date:ds,id:Date.now()}]}));setModal(null);};
  const del=id=>{if(isGuest)return;updClient(client.id,c=>({...c,posts:c.posts.filter(p=>p.id!==id)}));setDetail(null);};
  const saveNote=(postId,notes)=>{updClient(client.id,c=>({...c,posts:c.posts.map(p=>p.id===postId?{...p,notes}:p)}));setDetail(d=>d&&d.id===postId?{...d,notes}:d);};
  const saveScript=s=>{const isNew=!s.id;const script=isNew?{...s,id:Date.now().toString()}:s;updClient(client.id,c=>({...c,scripts:isNew?[...(c.scripts||[]),script]:(c.scripts||[]).map(x=>x.id===script.id?script:x)}));setScriptDetail(null);};
  const delScript=id=>{if(isGuest)return;updClient(client.id,c=>({...c,scripts:(c.scripts||[]).filter(s=>s.id!==id)}));};
  const saveScriptNote=(scriptId,notes)=>{updClient(client.id,c=>({...c,scripts:(c.scripts||[]).map(s=>s.id===scriptId?{...s,notes}:s)}));setScriptDetail(d=>d&&d.id===scriptId?{...d,notes}:d);};
  const prev=()=>month===0?(setMonth(11),setYear(y=>y-1)):setMonth(m=>m-1);
  const next=()=>month===11?(setMonth(0),setYear(y=>y+1)):setMonth(m=>m+1);
  const mPosts=posts.filter(p=>{const d=new Date(p.date+"T00:00:00");return d.getFullYear()===year&&d.getMonth()===month;});

  const VIEWS=[{id:"calendario",l:"\uD83D\uDCC5"},{id:"guiones",l:"\uD83D\uDCDD Gui\u00F3n"},{id:"feed",l:"\uD83D\uDDBC\uFE0F Feed"}];

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:"100vh",background:"#f7f6f2"}}>
      {/* HEADER */}
      <div style={{background:"#1a1a1a",color:"#fff",padding:"11px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 12px rgba(0,0,0,.3)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:client.color||"#6c5ce7",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0}}>{client.name.charAt(0).toUpperCase()}</div>
          <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,lineHeight:1}}>{client.name}</div><div style={{fontSize:8,color:"#666",marginTop:1}}>Planificador RRSS</div></div>
          {isGuest&&<span style={{background:"#f0a500",color:"#fff",borderRadius:5,padding:"2px 7px",fontSize:9,fontWeight:700}}>\uD83D\uDC64 Invitado</span>}
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{display:"flex",background:"#2a2a2a",borderRadius:20,padding:"3px",gap:1}}>
            {VIEWS.map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{padding:"4px 10px",borderRadius:17,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,background:view===v.id?"#fff":"transparent",color:view===v.id?"#1a1a1a":"#777",transition:"all .2s"}}>{v.l}</button>)}
          </div>
          {view==="calendario"&&<div style={{display:"flex",gap:3,background:"#2a2a2a",borderRadius:20,padding:"3px"}}>{["all","instagram","linkedin"].map(p=><button key={p} onClick={()=>setFilterP(p)} style={{padding:"3px 8px",borderRadius:17,border:"none",cursor:"pointer",fontSize:10,fontWeight:600,background:filterP===p?"#fff":"transparent",color:filterP===p?"#1a1a1a":"#777"}}>{p==="all"?"Todas":PLAT[p].icon}</button>)}</div>}
          {acc.instagram&&<a href={"https://instagram.com/"+acc.instagram} target="_blank" rel="noopener noreferrer" style={{background:"#E1306C",color:"#fff",borderRadius:5,padding:"3px 7px",fontSize:9,fontWeight:700,textDecoration:"none"}}>\uD83D\uDCF8 @{acc.instagram}</a>}
          {acc.linkedin&&<a href={"https://linkedin.com/in/"+acc.linkedin} target="_blank" rel="noopener noreferrer" style={{background:"#0A66C2",color:"#fff",borderRadius:5,padding:"3px 7px",fontSize:9,fontWeight:700,textDecoration:"none"}}>\uD83D\uDCBC @{acc.linkedin}</a>}
          {!isGuest&&<button onClick={()=>setShowAcc(true)} style={{padding:"3px 7px",borderRadius:5,border:"1px solid #333",background:"transparent",color:"#999",fontSize:9,cursor:"pointer"}}>\uD83D\uDD17 Cuentas</button>}
          {!isGuest&&client.id==="admin"&&<button onClick={()=>setShowAdmin(true)} style={{padding:"3px 7px",borderRadius:5,border:"1px solid #444",background:"transparent",color:"#bbb",fontSize:9,cursor:"pointer"}}>\uD83D\uDC65 Clientes</button>}
          <div style={{background:"#2a2a2a",borderRadius:5,padding:"3px 7px",fontSize:9,color:"#ccc"}}><span style={{color:"#fff",fontWeight:700}}>{mPosts.length}</span> <span style={{color:"#4caf50",fontWeight:700}}>{mPosts.filter(p=>p.status==="Publicado").length}</span> pub.</div>
          {saving&&<div style={{fontSize:9,color:"#f0a500"}}>\u2601\uFE0F Guard...</div>}
          <button onClick={()=>setSession(null)} style={{padding:"3px 7px",borderRadius:5,border:"1px solid #333",background:"transparent",color:"#666",fontSize:10,cursor:"pointer"}} title="Cerrar sesi\u00F3n">\u21A9\uFE0F</button>
        </div>
      </div>

      {/* VIEWS */}
      {view==="feed"&&<FeedView posts={posts} acc={acc} onSelect={setDetail}/>}
      {view==="guiones"&&<ScriptsView scripts={scripts} posts={posts} isGuest={isGuest} onOpen={s=>setScriptDetail(s)} onNew={()=>setScriptDetail({...EMPTY_SCRIPT})} onDelete={delScript}/>}

      {view==="calendario"&&(
        <div className="fade">
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"12px 18px 4px"}}>
            <button onClick={prev} style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:7,width:27,height:27,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>\u2039</button>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,minWidth:170,textAlign:"center"}}>{MON[month]} {year}</div>
            <button onClick={next} style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:7,width:27,height:27,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>\u203A</button>
          </div>
          <div style={{padding:"6px 18px 20px"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>{DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:8,fontWeight:700,color:"#aaa",padding:"4px 0",textTransform:"uppercase",letterSpacing:1}}>{d}</div>)}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {Array.from({length:fd}).map((_,i)=><div key={"e"+i} style={{minHeight:96}}/>)}
              {Array.from({length:dim}).map((_,i)=>{
                const day=i+1,dp=pfDay(day),isT=today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===year;
                return(
                  <div key={day} style={{minHeight:96,background:"#fff",borderRadius:8,padding:"5px 4px",border:isT?"2px solid #1a1a1a":"1.5px solid #ebebeb",display:"flex",flexDirection:"column",gap:2,transition:"box-shadow .15s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:1}}>
                      <span style={{fontSize:9,fontWeight:isT?700:500,background:isT?"#1a1a1a":"transparent",color:isT?"#fff":"#666",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center"}}>{day}</span>
                      {!isGuest&&<button onClick={()=>openAdd(day)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:11,lineHeight:1,padding:0}}>+</button>}
                    </div>
                    {dp.slice(0,3).map(post=>{
                      const pl=PLAT[post.platform],ct=CT.find(c=>c.v===post.ctype),thumb=resolve(post.coverDriveUrl||post.driveUrl);
                      return<div key={post.id} onClick={()=>setDetail(post)} style={{background:pl.bg,borderLeft:"3px solid "+pl.color,borderRadius:3,padding:"2px 3px",fontSize:8,fontWeight:500,cursor:"pointer",color:"#333",display:"flex",alignItems:"center",gap:2,overflow:"hidden"}}>
                        {thumb?<img src={thumb} alt="" style={{width:12,height:12,borderRadius:2,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"} crossOrigin="anonymous"/>:<span style={{flexShrink:0,fontSize:8}}>{ct?.i||pl.icon}</span>}
                        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{post.title}</span>
                      </div>;
                    })}
                    {dp.length>3&&<div style={{fontSize:7,color:"#bbb",textAlign:"center"}}>+{dp.length-3}</div>}
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{display:"flex",gap:6,padding:"0 18px 16px",flexWrap:"wrap"}}>{ST_OPT.map(s=><div key={s} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:"#888"}}><span style={{width:6,height:6,borderRadius:2,background:ST_CLR[s],border:"1px solid #ddd",display:"inline-block"}}/>{s}</div>)}</div>
        </div>
      )}

      {/* MODALS */}
      {modal&&!isGuest&&<PostModal modal={modal} month={month} year={year} form={form} setForm={setForm} onSave={save} onClose={()=>setModal(null)} scripts={scripts}/>}
      {detail&&<DetailModal post={detail} onEdit={openEdit} onDelete={del} onClose={()=>setDetail(null)} isGuest={isGuest} onSaveNote={saveNote} linkedScript={detail.linkedScriptId?scripts.find(s=>s.id===detail.linkedScriptId):null} onOpenScript={s=>{setDetail(null);setScriptDetail(s);}}/>}
      {scriptDetail&&<ScriptModal script={scriptDetail} onSave={saveScript} onClose={()=>setScriptDetail(null)} isGuest={isGuest} onSaveNote={saveScriptNote} linkedPost={scriptDetail.id?posts.find(p=>p.linkedScriptId===scriptDetail.id):null}/>}
      {showAcc&&!isGuest&&<AccSettings acc={acc} onSave={a=>{updClient(client.id,c=>({...c,accounts:a}));setShowAcc(false);}} onClose={()=>setShowAcc(false)}/>}
      {showAdmin&&!isGuest&&<AdminPanel dbArg={dbData} onSave={nd=>{setDb(nd);setShowAdmin(false);}} onClose={()=>setShowAdmin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
